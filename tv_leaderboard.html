<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=3840,initial-scale=1">
<meta http-equiv="refresh" content="300">
<title>T1 Leaderboard &#8212; Florida Poly IT Help Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #1A0D2E;
  --card:   #2E1A4A;
  --purple: #501D83;
  --blue:   #009FDF;
  --pix:    #B095DE;
  --gold:   #FFD700;
  --silver: #C0C0C0;
  --bronze: #CD7F32;
  --green:  #22C55E;
  --amber:  #F59E0B;
  --red:    #EF4444;
  --text:   #FFFFFF;
  --muted:  #A7B4C3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Exo 2','Segoe UI',system-ui,sans-serif; }

/* Header */
.hdr { background: linear-gradient(135deg, #2E1A4A 0%, #501D83 100%); padding: 0 48px; display: flex; align-items: center; height: 72px; box-shadow: 0 4px 20px rgba(0,0,0,.5); position: relative; z-index: 10; }
.hdr-logo { height: 48px; width: auto; margin-right: 20px; }
.hdr-title { font-size: 1.5rem; font-weight: 800; letter-spacing: .5px; flex: 1; }
.hdr-title span { color: var(--pix); font-weight: 600; }
.hdr-week { font-size: 1rem; font-weight: 600; color: var(--pix); text-align: right; margin-right: 32px; }
.hdr-week small { display: block; font-size: .7rem; color: var(--muted); font-weight: 500; margin-top: 2px; }
.hdr-clock { font-size: 2rem; font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; min-width: 110px; text-align: right; }
.hdr-back { color: rgba(255,255,255,.5); font-size: .75rem; font-weight: 600; text-decoration: none; margin-right: 16px; letter-spacing: .05em; }
.hdr-back:hover { color: #fff; }

/* Main layout */
.main { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 72px - 36px - 72px); gap: 0; }

/* Champion panel */
.champ-panel { background: linear-gradient(180deg, #2E1A4A 0%, #1A0D2E 100%); border-right: 2px solid rgba(255,215,0,.15); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 24px 16px; text-align: center; overflow: hidden; }
.champ-trophy { font-size: 5rem; line-height: 1; margin-bottom: 12px; filter: drop-shadow(0 0 20px rgba(255,215,0,.4)); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
.champ-label { font-size: .75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 8px; }
.champ-name { font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 4px; text-shadow: 0 0 30px rgba(255,215,0,.25); }
.champ-week { font-size: .72rem; color: var(--muted); margin-bottom: 20px; }
.champ-stats { display: flex; gap: 20px; }
.champ-stat { text-align: center; }
.champ-stat .v { font-size: 2rem; font-weight: 800; line-height: 1; }
.champ-stat .l { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-top: 4px; }
.champ-empty { color: var(--muted); font-size: 1rem; font-style: italic; }
.champ-glow { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(255,215,0,.08) 0%, transparent 70%); position: absolute; pointer-events: none; }

/* Hall of Fame */
.hof-divider { width: 80%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,215,0,.3), transparent); margin: 24px 0 16px; flex-shrink: 0; }
.hof-label { font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 10px; opacity: .7; flex-shrink: 0; }
.hof-scroll { flex: 1; overflow: hidden; width: 100%; position: relative; mask-image: linear-gradient(to bottom, black 85%, transparent); -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent); }
.hof-list { display: flex; flex-direction: column; gap: 5px; padding: 0 4px; }
.hof-entry { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: rgba(80,29,131,.15); border-radius: 8px; border-left: 3px solid var(--gold); flex-shrink: 0; }
.hof-trophy { font-size: .8rem; flex-shrink: 0; }
.hof-name { font-size: .82rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }
.hof-stats { font-size: .6rem; color: var(--pix); white-space: nowrap; flex-shrink: 0; }
.hof-week { font-size: .58rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

/* Leaderboard */
.lb { padding: 20px 40px 0; overflow: hidden; display: flex; flex-direction: column; }
.lb-header { display: grid; grid-template-columns: 64px 1fr 160px 140px 120px; padding: 0 16px 10px; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); border-bottom: 1px solid rgba(176,149,222,.15); }
.sort-btn { background: none; border: none; font: inherit; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all .15s; text-align: center; }
.sort-btn:hover { color: var(--pix); background: rgba(176,149,222,.1); }
.sort-btn.active { color: var(--blue); background: rgba(0,159,223,.12); border: 1px solid rgba(0,159,223,.25); }
.lb-rows { flex: 1; display: flex; flex-direction: column; gap: 6px; padding-top: 10px; }
.lb-row { display: grid; grid-template-columns: 64px 1fr 160px 140px 120px; align-items: center; padding: 10px 16px; background: var(--card); border-radius: 10px; position: relative; overflow: hidden; transition: transform .15s; }
.lb-row .bar-bg { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, rgba(0,159,223,.12), transparent); border-radius: 10px; pointer-events: none; transition: width .5s ease; }
.lb-row > * { position: relative; z-index: 1; }

/* Rank badges */
.rank { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 800; }
.rank-1 { background: linear-gradient(135deg, #FFD700, #FFA000); color: #1A0D2E; box-shadow: 0 0 18px rgba(255,215,0,.35); }
.rank-2 { background: linear-gradient(135deg, #C0C0C0, #8A8A8A); color: #1A0D2E; box-shadow: 0 0 12px rgba(192,192,192,.25); }
.rank-3 { background: linear-gradient(135deg, #CD7F32, #A0522D); color: #fff; box-shadow: 0 0 12px rgba(205,127,50,.25); }
.rank-n { background: rgba(176,149,222,.15); color: var(--pix); }

.lb-row.top-1 { border: 1px solid rgba(255,215,0,.25); background: linear-gradient(90deg, rgba(255,215,0,.06), var(--card)); }
.lb-row.top-2 { border: 1px solid rgba(192,192,192,.15); }
.lb-row.top-3 { border: 1px solid rgba(205,127,50,.15); }
.lb-row.inactive { opacity: .35; }

.lb-name { font-size: 1.35rem; font-weight: 700; padding-left: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-name .fire { margin-left: 6px; }

/* Metric columns */
.lb-metric { text-align: center; }
.lb-metric .val { font-size: 1.6rem; font-weight: 800; line-height: 1; }
.lb-metric .lbl { font-size: .55rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-top: 2px; }
.val-comments { color: var(--blue); }
.val-resolved { color: var(--pix); }

/* SLA pill */
.sla-pill { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: .85rem; font-weight: 800; }
.sla-good { background: rgba(34,197,94,.15); color: var(--green); }
.sla-warn { background: rgba(245,158,11,.15); color: var(--amber); }
.sla-bad  { background: rgba(239,68,68,.15); color: var(--red); }
.sla-na   { color: var(--muted); font-size: .8rem; font-weight: 600; }

/* Trend arrows */
.trend-up { color: var(--green); font-size: .65rem; margin-left: 4px; display: inline-block; animation: fadeIn .3s; }
.trend-dn { color: var(--red); font-size: .65rem; margin-left: 4px; display: inline-block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* Footer */
.ftr { height: 72px; display: flex; align-items: center; gap: 24px; font-size: .72rem; color: var(--muted); border-top: 1px solid rgba(176,149,222,.1); padding: 0 48px; }
.ftr strong { color: var(--pix); }
.ftr .refresh-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 3s ease-in-out infinite; }
.ftr-left { display: flex; align-items: center; gap: 16px; }
.ftr-goal { flex: 1; margin: 0 32px; }
.ftr-right { display: flex; align-items: center; gap: 16px; white-space: nowrap; }

/* Daily goal bar */
.goal-wrap { position: relative; height: 32px; background: rgba(176,149,222,.12); border-radius: 99px; overflow: hidden; min-width: 300px; }
.goal-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 99px; transition: width 1.5s ease; }
.goal-fill.on-track { background: linear-gradient(90deg, rgba(34,197,94,.7), rgba(34,197,94,.9)); }
.goal-fill.behind   { background: linear-gradient(90deg, rgba(245,158,11,.7), rgba(245,158,11,.9)); }
.goal-fill.complete  { background: linear-gradient(90deg, var(--gold), #FFA000); box-shadow: 0 0 20px rgba(255,215,0,.4); }
.goal-text { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; height: 100%; font-size: .82rem; font-weight: 700; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.4); letter-spacing: .3px; }
.goal-label { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); text-align: center; margin-top: 3px; }

/* Detail overlay */
.detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.detail-overlay.open { display: flex; }
.detail-card { background: linear-gradient(135deg, #2E1A4A, #1A0D2E); border: 1px solid rgba(176,149,222,.2); border-radius: 20px; padding: 36px 40px; max-width: 560px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
.detail-close { position: absolute; top: 16px; right: 24px; background: none; border: none; color: var(--muted); font-size: 2rem; cursor: pointer; line-height: 1; }
.detail-close:hover { color: #fff; }
.detail-name { font-size: 2.4rem; font-weight: 800; margin-bottom: 4px; }
.detail-sub { font-size: .8rem; color: var(--muted); margin-bottom: 24px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.detail-stat { background: rgba(80,29,131,.2); border-radius: 12px; padding: 14px; text-align: center; }
.detail-stat .dv { font-size: 2rem; font-weight: 800; line-height: 1; }
.detail-stat .dl { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-top: 6px; }
.detail-compare { display: flex; gap: 12px; }
.detail-cmp { flex: 1; padding: 10px; background: rgba(0,0,0,.2); border-radius: 10px; text-align: center; }
.detail-cmp .dc-label { font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; }
.detail-cmp .dc-val { font-size: 1.1rem; font-weight: 800; }

/* CSAT spotlight */
.csat-spot { margin-top: 16px; padding: 12px 14px; background: rgba(255,215,0,.06); border: 1px solid rgba(255,215,0,.15); border-radius: 10px; flex-shrink: 0; min-height: 70px; transition: opacity .5s; }
.csat-spot-label { font-size: .55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 6px; opacity: .7; }
.csat-spot-stars { color: #F59E0B; font-size: .85rem; margin-bottom: 4px; }
.csat-spot-text { font-size: .75rem; font-style: italic; color: rgba(255,255,255,.8); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.csat-spot-key { font-size: .58rem; color: var(--muted); margin-top: 4px; }

@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* Badges */
.badge-row { display: inline-flex; gap: 3px; margin-left: 6px; vertical-align: middle; }
.badge-icon { font-size: .7rem; filter: drop-shadow(0 0 3px rgba(255,215,0,.3)); }
.badge-count { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,215,0,.15); color: var(--gold); font-size: .55rem; font-weight: 800; min-width: 18px; height: 18px; border-radius: 99px; margin-left: 4px; border: 1px solid rgba(255,215,0,.25); }

/* Streak */
.streak-badge { display: inline-flex; align-items: center; gap: 3px; background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.25); color: var(--red); font-size: .6rem; font-weight: 800; padding: 1px 7px; border-radius: 99px; margin-left: 5px; }
.streak-badge.hot { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.3); color: var(--amber); }
.streak-badge.fire { background: rgba(255,215,0,.15); border-color: rgba(255,215,0,.3); color: var(--gold); animation: pulse 2s ease-in-out infinite; }

/* Detail badges grid */
.detail-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
.detail-badge { display: flex; align-items: flex-start; gap: 8px; background: rgba(80,29,131,.2); border: 1px solid rgba(176,149,222,.15); padding: 8px 12px; border-radius: 10px; font-size: .72rem; min-width: 140px; }
.detail-badge .db-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
.detail-badge .db-text { display: flex; flex-direction: column; }
.detail-badge .db-name { font-weight: 700; color: #fff; line-height: 1.2; }
.detail-badge .db-desc { font-size: .58rem; color: var(--muted); font-weight: 500; margin-top: 2px; line-height: 1.3; }
.detail-badge.locked { opacity: .25; filter: grayscale(1); }

/* Ticker */
.ticker-bar { height: 36px; background: linear-gradient(90deg, rgba(0,0,0,.3), rgba(46,26,74,.4)); border-top: 1px solid rgba(176,149,222,.08); border-bottom: 1px solid rgba(176,149,222,.08); overflow: hidden; display: flex; align-items: center; }
.ticker-track { display: flex; gap: 48px; white-space: nowrap; animation: scroll-left var(--ticker-dur, 30s) linear infinite; padding-left: 100%; }
.ticker-item { display: flex; align-items: center; gap: 6px; font-size: .78rem; font-weight: 600; color: var(--pix); flex-shrink: 0; }
.ticker-item .ti-icon { font-size: .9rem; }
.ticker-item .ti-key { color: var(--blue); font-weight: 700; }
@keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-100% - 100vw)); } }
</style>
</head>

function e(s) { return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let sortMode = 'comments'; // 'comments' or 'resolved'

function rankMembers(members, stats) {
  return [...members].filter(m=>m.accountId).sort((a,b) => {
    const sa = stats[a.accountId], sb = stats[b.accountId];
    if (!sa && !sb) return 0;
    if (!sa) return 1;
    if (!sb) return -1;
    if (sortMode === 'resolved') {
      const ra = sa.resolvedCount||0, rb = sb.resolvedCount||0;
      if (rb !== ra) return rb - ra;
      const ca = sa.commentCount||0, cb = sb.commentCount||0;
      if (cb !== ca) return cb - ca;
    } else {
      const ca = sa.commentCount||0, cb = sb.commentCount||0;
      if (cb !== ca) return cb - ca;
      const ra = sa.resolvedCount||0, rb = sb.resolvedCount||0;
      if (rb !== ra) return rb - ra;
    }
    return (sa.avgResDays??9999) - (sb.avgResDays??9999);
  });
}

function toggleSort(mode) {
  sortMode = mode;
  renderLeaderboard();
}

function slaClass(rate) {
  if (rate == null) return 'sla-na';
  if (rate >= 90) return 'sla-good';
  if (rate >= 70) return 'sla-warn';
  return 'sla-bad';
}

  renderLeaderboard();
}

function renderLeaderboard() {
  // Update week label with current sort
  const sortLabel = sortMode === 'comments' ? 'comments' : 'resolved';
  document.getElementById('weekLabel').innerHTML = `Week of ${DATA.thisWeek.label}<small>Ranking by ${sortLabel} &middot; SLA &le;${DATA.slaDays}d</small>`;

  const ranked = rankMembers(DATA.t1, DATA.twStats);
  const maxComments = Math.max(1, ...ranked.map(m => (DATA.twStats[m.accountId]?.commentCount||0)));

  const lb = document.getElementById('lb');
  const cActive = sortMode==='comments' ? 'active' : '';
  const rActive = sortMode==='resolved' ? 'active' : '';
  const headerHtml = `<div class="lb-header"><div></div><div>Name</div><div style="text-align:center"><button class="sort-btn ${cActive}" onclick="toggleSort('comments')">Comments &#9660;</button></div><div style="text-align:center"><button class="sort-btn ${rActive}" onclick="toggleSort('resolved')">Resolved &#9660;</button></div><div style="text-align:center">SLA</div></div>`;

  const rowsHtml = ranked.map((m, i) => {
    const s = DATA.twStats[m.accountId] || {commentCount:0,resolvedCount:0,slaRate:null,avgResDays:null};
    const rank = i + 1;
    const rankCls = rank<=3 ? 'rank-'+rank : 'rank-n';
    const rowCls  = rank===1?'top-1':rank===2?'top-2':rank===3?'top-3':'';
    const inactive = (s.commentCount||0)===0 && (s.resolvedCount||0)===0;
    const barW = Math.round((s.commentCount||0) / maxComments * 100);
    const todayCmts = (DATA.todayComments && DATA.todayComments[m.accountId]) || 0;
    const fire = todayCmts >= 10 ? '<span class="fire">&#128293;</span>' : '';
    const firstName = m.name.split(' ')[0];
    const slaHtml = s.slaRate != null
      ? `<span class="sla-pill ${slaClass(s.slaRate)}">${s.slaRate}%</span>`
      : '<span class="sla-na">\u2014</span>';

    // Trend vs last week
    const lw = DATA.lwStats[m.accountId];
    let trend = '';
    if (lw) {
      const twScore = (s.commentCount||0) + (s.resolvedCount||0);
      const lwScore = (lw.commentCount||0) + (lw.resolvedCount||0);
      if (twScore > lwScore * 1.2) trend = '<span class="trend-up">&#9650;</span>';
      else if (lwScore > 0 && twScore < lwScore * 0.7) trend = '<span class="trend-dn">&#9660;</span>';
    }

    // Badges & streak
    const ach = DATA.achievements && DATA.achievements[m.accountId];
    let badgeHtml = '';
    if (ach && ach.badges && ach.badges.length > 0) {
      badgeHtml = `<span class="badge-count" title="${ach.badges.length} badges">${ach.badges.length}</span>`;
    }
    let streakHtml = '';
    if (ach && ach.streak >= 3) {
      const sCls = ach.streak >= 8 ? 'fire' : (ach.streak >= 5 ? 'hot' : '');
      streakHtml = `<span class="streak-badge ${sCls}">&#128293;${ach.streak}w</span>`;
    }

    return `<div class="lb-row ${rowCls} ${inactive?'inactive':''}" onclick="openDetail('${m.accountId}')" style="cursor:pointer">
      <div class="bar-bg" style="width:${barW}%"></div>
      <div><div class="rank ${rankCls}">${rank}</div></div>
      <div class="lb-name">${e(firstName)}${fire}${streakHtml}${badgeHtml}${trend}</div>
      <div class="lb-metric"><div class="val val-comments">${s.commentCount||0}</div><div class="lbl">Comments</div></div>
      <div class="lb-metric"><div class="val val-resolved">${s.resolvedCount||0}</div><div class="lbl">Resolved</div></div>
      <div class="lb-metric">${slaHtml}</div>
    </div>`;
  }).join('');

  lb.innerHTML = headerHtml + `<div class="lb-rows">${rowsHtml}</div>`;
}

  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});

setInterval(updateClock, 1000);

// Badge definitions
const BADGES = {
  first_blood:   { icon: '\uD83C\uDFAF', name: 'First Blood', desc: 'Resolved first ticket' },
  closer_50:     { icon: '\uD83D\uDCCB', name: 'Closer',      desc: '50 tickets resolved' },
  centurion:     { icon: '\uD83C\uDFC6', name: 'Centurion',   desc: '100 tickets resolved' },
  legend_250:    { icon: '\u2B50',        name: 'Legend',       desc: '250 tickets resolved' },
  titan_500:     { icon: '\uD83D\uDC8E', name: 'Titan',        desc: '500 tickets resolved' },
  chatter_100:   { icon: '\uD83D\uDCAC', name: 'Chatterbox',  desc: '100 comments' },
  megaphone_500: { icon: '\uD83D\uDCE3', name: 'Megaphone',   desc: '500 comments' },
  streak_4:      { icon: '\uD83D\uDD25', name: 'On Fire',      desc: '4-week streak' },
  streak_8:      { icon: '\u26A1',        name: 'Unstoppable', desc: '8-week streak' },
  champion_1:    { icon: '\uD83E\uDD47', name: 'Champion',    desc: 'Won weekly #1' },
  champion_3:    { icon: '\uD83D\uDC51', name: 'Triple Crown', desc: 'Won 3 weekly #1s' }
};

function openDetail(aid) {
  const m = DATA.t1.find(t => t.accountId === aid);
  if (!m) return;
  const tw = DATA.twStats[aid] || {};
  const lw = DATA.lwStats[aid] || {};
  const todayCmts = (DATA.todayComments && DATA.todayComments[aid]) || 0;
  const todayRes  = (DATA.todayResByPerson && DATA.todayResByPerson[aid]) || 0;
  const ach = DATA.achievements && DATA.achievements[aid];

  // Build badge display
  let badgesHtml = '';
  if (ach) {
    const allBadgeKeys = Object.keys(BADGES);
    badgesHtml = '<div class="detail-badges">' + allBadgeKeys.map(k => {
      const b = BADGES[k];
      const earned = ach.badges && ach.badges.includes(k);
      return `<div class="detail-badge ${earned?'':'locked'}"><span class="db-icon">${b.icon}</span><span class="db-text"><span class="db-name">${b.name}</span><span class="db-desc">${b.desc}</span></span></div>`;
    }).join('') + '</div>';
  }

  // Streak + all-time stats
  let allTimeHtml = '';
  if (ach) {
    allTimeHtml = `<div style="margin-top:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--pix);margin-bottom:10px">All-Time</div>
    <div class="detail-grid">
      <div class="detail-stat"><div class="dv" style="color:var(--pix)">${ach.totalResolved}</div><div class="dl">Resolved</div></div>
      <div class="detail-stat"><div class="dv" style="color:var(--blue)">${ach.totalComments}</div><div class="dl">Comments</div></div>
      <div class="detail-stat"><div class="dv" style="color:${ach.streak>=4?'var(--gold)':'var(--muted)'}">${ach.streak}w</div><div class="dl">Streak${ach.bestStreak>ach.streak?' (best: '+ach.bestStreak+')':''}</div></div>
    </div>`;
  }

  const card = document.getElementById('detailCard');
  card.innerHTML = `
    <button class="detail-close" onclick="closeDetail()">&#10005;</button>
    <div class="detail-name">${e(m.name)}</div>
    <div class="detail-sub">T1 Student Worker${ach&&ach.championWins?' \u00b7 \uD83C\uDFC6 '+ach.championWins+'x Champion':''}</div>
    <div class="detail-grid">
      <div class="detail-stat"><div class="dv" style="color:var(--blue)">${tw.commentCount||0}</div><div class="dl">Comments</div></div>
      <div class="detail-stat"><div class="dv" style="color:var(--pix)">${tw.resolvedCount||0}</div><div class="dl">Resolved</div></div>
      <div class="detail-stat"><div class="dv" style="color:${tw.slaRate!=null&&tw.slaRate>=90?'var(--green)':tw.slaRate!=null&&tw.slaRate>=70?'var(--amber)':'var(--red)'}">${tw.slaRate!=null?tw.slaRate+'%':'\u2014'}</div><div class="dl">SLA Rate</div></div>
    </div>
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:10px">Today</div>
    <div class="detail-grid" style="margin-bottom:24px">
      <div class="detail-stat"><div class="dv" style="color:var(--blue)">${todayCmts}</div><div class="dl">Comments</div></div>
      <div class="detail-stat"><div class="dv" style="color:var(--pix)">${todayRes}</div><div class="dl">Resolved</div></div>
      <div class="detail-stat"><div class="dv" style="color:var(--green)">${tw.avgResDays!=null?tw.avgResDays+'d':'\u2014'}</div><div class="dl">Avg Res Time</div></div>
    </div>
    <div class="detail-compare">
      <div class="detail-cmp"><div class="dc-label">This Week</div><div class="dc-val" style="color:var(--blue)">${(tw.commentCount||0)+(tw.resolvedCount||0)}</div><div class="dc-label" style="margin-top:4px">Total Activity</div></div>
      <div class="detail-cmp"><div class="dc-label">Last Week</div><div class="dc-val" style="color:var(--pix)">${(lw.commentCount||0)+(lw.resolvedCount||0)}</div><div class="dc-label" style="margin-top:4px">Total Activity</div></div>
      <div class="detail-cmp"><div class="dc-label">Change</div><div class="dc-val">${(() => {
        const twS = (tw.commentCount||0)+(tw.resolvedCount||0);
        const lwS = (lw.commentCount||0)+(lw.resolvedCount||0);
        if (!lwS) return '<span style="color:var(--muted)">\u2014</span>';
        const pct = Math.round((twS/lwS - 1) * 100);
        return pct >= 0 ? '<span style="color:var(--green)">+'+pct+'%</span>' : '<span style="color:var(--red)">'+pct+'%</span>';
      })()}</div><div class="dc-label" style="margin-top:4px">vs Last Week</div></div>
    </div>
    ${allTimeHtml}
    ${badgesHtml}`;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

(function() {
  if (!DATA.csatSpotlight || DATA.csatSpotlight.length === 0) return;
  const champ = document.getElementById('champ');
  // Insert before the Hall of Fame divider if it exists, otherwise append
  const spot = document.createElement('div');
  spot.className = 'csat-spot';
  spot.id = 'csatSpot';
  // Insert after champ-stats or champ-empty
  const hofDiv = champ.querySelector('.hof-divider');
  if (hofDiv) champ.insertBefore(spot, hofDiv);
  else champ.appendChild(spot);

  let idx = 0;
  function showCsat() {
    const c = DATA.csatSpotlight[idx % DATA.csatSpotlight.length];
    const stars = '\u2605'.repeat(c.rating) + '\u2606'.repeat(5 - c.rating);
    spot.style.opacity = '0';
    setTimeout(() => {
      spot.innerHTML = `<div class="csat-spot-label">&#11088; Customer Feedback</div><div class="csat-spot-stars">${stars}</div><div class="csat-spot-text">&ldquo;${e(c.comment)}&rdquo;</div><div class="csat-spot-key">${e(c.key)}</div>`;
      spot.style.opacity = '1';
    }, 500);
    idx++;
  }
  showCsat();
  setInterval(showCsat, 10000);
})();

(function() {
  const items = (DATA.ticker || []).map(ev => {
    if (ev.type === 'resolved') {
      return `<span class="ticker-item"><span class="ti-icon">&#127881;</span>${e(ev.name.split(' ')[0])} resolved <span class="ti-key">${e(ev.key)}</span></span>`;
    } else if (ev.type === 'comments') {
      return `<span class="ticker-item"><span class="ti-icon">&#128172;</span>${e(ev.name.split(' ')[0])} hit ${ev.count} comments today</span>`;
    }
    return '';
  }).filter(Boolean);

  if (items.length === 0) {
    items.push('<span class="ticker-item"><span class="ti-icon">&#9889;</span>No activity yet today &mdash; be the first to resolve a ticket!</span>');
  }

  // Duplicate for seamless scroll
  const content = items.join('') + items.join('');
  const dur = Math.max(30, items.length * 12);
  const ticker = document.getElementById('ticker');
  ticker.innerHTML = `<div class="ticker-track" style="--ticker-dur:${dur}s">${content}</div>`;
})();
