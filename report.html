<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>IT Help Desk Status &ndash; Florida Polytechnic University</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Florida Poly: Purple #501D83 Â· Blue #009FDF Â· Plum #2E1A4A Â· Light Purple #B095DE Â· Slate #A7B4C3 */
:root {
  --purple:  #501D83;
  --plum:    #2E1A4A;
  --blue:    #009FDF;
  --pix:     #B095DE;
  --slate:   #A7B4C3;
  --graph:   #586066;
  --bg:      #F0EDF6;
  --card:    #FFFFFF;
  --text:    #1A0D2E;
  --muted:   #586066;
  --border:  #E4DFF0;
  --green:   #22C55E;
  --amber:   #F59E0B;
  --red:     #EF4444;
  --orange:  #F97316;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Exo 2', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.hdr { background: linear-gradient(135deg, var(--plum) 0%, var(--purple) 100%); color: #fff; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 3px 12px rgba(0,0,0,.35); position: sticky; top: 0; z-index: 200; }
.hdr-brand { display: flex; align-items: center; gap: 12px; padding: 13px 0; }
.hdr-logo { height: 38px; width: auto; flex-shrink: 0; display: block; }
.hdr-title h1 { font-size: 1.1rem; font-weight: 700; }
.hdr-title p  { font-size: .72rem; opacity: .65; margin-top: 1px; }
.hdr-meta { text-align: right; font-size: .75rem; opacity: .8; }
.hdr-meta strong { display: block; font-size: .88rem; opacity: 1; color: #fff; }
.hdr-meta .cdown { color: var(--pix); }
.hdr-meta .cdown b { color: #fff; }

/* Tabs */
.tabs-nav { background: var(--plum); display: flex; padding: 0 28px; gap: 1px; border-bottom: 2px solid rgba(0,159,223,.35); position: sticky; top: 67px; z-index: 190; }
.tab-btn { padding: 9px 16px; font-family: inherit; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.5); background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap; letter-spacing: .2px; }
.tab-btn:hover { color: rgba(255,255,255,.85); }
.tab-btn.active { color: #fff; border-bottom-color: var(--blue); }
.tab-badge { display: inline-block; background: rgba(0,159,223,.2); color: var(--blue); font-size: .65rem; font-weight: 700; padding: 1px 5px; border-radius: 99px; margin-left: 4px; vertical-align: middle; }
.tab-btn.active .tab-badge { background: rgba(0,159,223,.35); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Layout */
.wrap { max-width: 1500px; margin: 0 auto; padding: 20px 22px; }

/* KPI cards */
.kpi-row { display: grid; grid-template-columns: repeat(6,1fr); gap: 12px; margin-bottom: 18px; }
@media (max-width:1200px) { .kpi-row { grid-template-columns: repeat(3,1fr); } }
@media (max-width: 640px) { .kpi-row { grid-template-columns: 1fr 1fr; } }
.kpi { background: var(--card); border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 6px rgba(80,29,131,.08); border-left: 5px solid var(--border); cursor: pointer; transition: box-shadow .15s, transform .1s; user-select: none; }
.kpi:hover { box-shadow: 0 4px 16px rgba(80,29,131,.18); transform: translateY(-1px); }
.kpi:active { transform: translateY(0); }
.kpi-label { font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 7px; }
.kpi-val   { font-size: 2.5rem; font-weight: 800; line-height: 1; }
.kpi-sub   { font-size: .7rem; color: var(--slate); margin-top: 5px; }
.kpi-hint  { font-size: .65rem; color: var(--pix); margin-top: 3px; font-style: italic; }
.kpi.k-open     { border-left-color: var(--purple); } .kpi.k-open .kpi-val { color: var(--purple); }
.kpi.k-created  { border-left-color: var(--blue); }  .kpi.k-created .kpi-val { color: #0076A8; }
.kpi.k-resolved { border-left-color: var(--green); } .kpi.k-resolved .kpi-val { color: #16A34A; }
.kpi.k-unassign { border-left-color: var(--amber); } .kpi.k-unassign .kpi-val { color: #B45309; }
.kpi.k-esc      { border-left-color: var(--red); }   .kpi.k-esc .kpi-val { color: var(--red); }
.kpi.k-sla      { border-left-color: var(--orange); } .kpi.k-sla .kpi-val { color: #C2410C; }

/* Alert */
.alert { background: #FFF1F2; border: 1px solid #FECACA; border-radius: 8px; padding: 9px 14px; margin-bottom: 14px; color: #991B1B; font-size: .82rem; font-weight: 600; }

/* Cards */
.card { background: var(--card); border-radius: 10px; box-shadow: 0 1px 6px rgba(80,29,131,.08); margin-bottom: 16px; overflow: hidden; }
.card-hdr { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-hdr h2 { font-size: .88rem; font-weight: 700; }
.card-hdr.purple  { background: linear-gradient(90deg,var(--plum),var(--purple)); color: #fff; border-bottom: none; }
.card-hdr.purple h2 { color: #fff; }
.card-hdr.blue    { background: linear-gradient(90deg,#0076A8,var(--blue)); color: #fff; border-bottom: none; }
.card-hdr.blue h2 { color: #fff; }
.card-hdr.red     { background: #FFF1F2; border-bottom-color: #FECACA; }
.card-hdr.red h2  { color: #991B1B; }
.chip { background: rgba(80,29,131,.1); color: var(--purple); font-size: .68rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
.card-hdr.purple .chip, .card-hdr.blue .chip { background: rgba(255,255,255,.2); color: #fff; }

/* Two-col / Three-col */
.two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }
@media (max-width:1100px) { .three-col { grid-template-columns: 1fr 1fr; } }
@media (max-width:860px)  { .two-col, .three-col { grid-template-columns: 1fr; } }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: .83rem; }
th { padding: 8px 13px; text-align: left; font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); background: #F8F5FD; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 8px 13px; border-bottom: 1px solid #F5F2FA; vertical-align: middle; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAF8FE; }
.no-data { text-align: center; color: var(--slate); font-style: italic; padding: 18px !important; white-space: normal !important; }
.num { font-weight: 700; text-align: right; }
.pct { color: var(--muted); font-size: .74rem; text-align: right; }
.smol { font-size: .73rem; color: var(--muted); }
.ua { color: #B45309; font-weight: 600; }

/* Badges */
.badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: .68rem; font-weight: 700; white-space: nowrap; }
.s-waiting  { background: #FEF3C7; color: #92400E; }
.s-inprog   { background: #EDE9FE; color: #5B21B6; }
.s-pending  { background: #E0F2FE; color: #075985; }
.s-esc2     { background: #FFEDD5; color: #C2410C; }
.s-esc3     { background: #FEE2E2; color: #991B1B; }
.s-addlinfo { background: #CFFAFE; color: #0E7490; }
.s-reqinfo  { background: #FEF9C3; color: #854D0E; }
.s-gather   { background: #DBEAFE; color: #1E40AF; }
.s-todo     { background: #F1F5F9; color: #475569; }
.s-done     { background: #DCFCE7; color: #15803D; }
.s-default  { background: #F1F5F9; color: #475569; }

/* Bar */
.bar-wrap { background: #EDE9FE; border-radius: 99px; height: 7px; min-width: 60px; }
.bar { height: 7px; border-radius: 99px; min-width: 4px; }
.bar.s-waiting { background: var(--amber); } .bar.s-inprog { background: var(--purple); }
.bar.s-pending { background: var(--blue); }  .bar.s-esc2   { background: var(--orange); }
.bar.s-esc3    { background: var(--red); }   .bar.s-addlinfo { background: #06B6D4; }
.bar.s-reqinfo { background: #EAB308; }      .bar.s-gather { background: #3B82F6; }
.bar.s-todo, .bar.s-default { background: var(--slate); }

/* Person cards */
.people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px,1fr)); gap: 14px; margin-bottom: 16px; }
@media (max-width:860px) { .people-grid { grid-template-columns: 1fr; } }
.person-card { background: var(--card); border-radius: 10px; box-shadow: 0 1px 6px rgba(80,29,131,.08); overflow: hidden; border-top: 3px solid var(--purple); }
.person-card.t1 { border-top-color: var(--blue); }
.person-hdr { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; background: #FDFBFF; border-bottom: 1px solid var(--border); }
.person-name { font-weight: 700; font-size: .92rem; }
.person-role { font-size: .69rem; color: var(--muted); margin-top: 1px; }
.person-stats { display: flex; border-bottom: 1px solid var(--border); }
.pstat { flex: 1; text-align: center; padding: 9px 6px; border-right: 1px solid var(--border); font-size: .67rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
.pstat:last-child { border-right: none; }
.pstat .n { display: block; font-size: 1.4rem; font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 1px; }
.pstat .n.zero { color: var(--slate); }
.pstat .n.green { color: #16A34A; }
.pstat .n.blue  { color: var(--blue); }
.person-sec-title { padding: 6px 13px; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); background: #F8F5FD; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.person-item { display: flex; align-items: center; gap: 7px; padding: 6px 13px; border-bottom: 1px solid #F5F2FA; font-size: .8rem; }
.person-item:last-child { border-bottom: none; }
.person-item .pk { color: var(--blue); font-weight: 600; white-space: nowrap; flex-shrink: 0; font-size: .78rem; }
.person-item .ps { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.person-item .pt { white-space: nowrap; font-size: .71rem; color: var(--muted); flex-shrink: 0; }
.person-item.touched { background: #FDFCFF; }
.person-item.touched .pk { color: var(--graph); }
.no-act { padding: 8px 13px; font-size: .78rem; color: var(--slate); font-style: italic; }
.more-btn { cursor: pointer; color: var(--blue); font-style: normal; font-weight: 600; }
.more-btn:hover { background: #F0F9FF; text-decoration: underline; }
.tier-t1 { display: inline-block; font-size: .63rem; font-weight: 700; padding: 1px 6px; border-radius: 99px; background: rgba(0,159,223,.1); color: #0369A1; }
.tier-t2 { display: inline-block; font-size: .63rem; font-weight: 700; padding: 1px 6px; border-radius: 99px; background: rgba(80,29,131,.1); color: var(--purple); }

/* â”€â”€ KPI MODAL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(46,26,74,.55);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--card);
  border-radius: 12px;
  width: 100%;
  max-width: 960px;
  max-height: 82vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,.35);
  overflow: hidden;
}
.modal-hdr {
  padding: 14px 20px;
  background: linear-gradient(135deg, var(--plum), var(--purple));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.modal-hdr h2 { font-size: 1rem; font-weight: 700; }
.modal-hdr .count { font-size: .78rem; opacity: .75; margin-top: 2px; }
.modal-close {
  background: rgba(255,255,255,.15);
  border: none;
  color: #fff;
  width: 30px; height: 30px;
  border-radius: 6px;
  font-size: 1.1rem;
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: background .15s;
}
.modal-close:hover { background: rgba(255,255,255,.3); }
.modal-body { overflow-y: auto; flex: 1; }
.modal-body table { font-size: .82rem; }
.modal-body td { white-space: normal; max-width: none; }
.modal-body td:first-child { white-space: nowrap; }

/* Escalation banner (overview) */
.esc-banner { border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; cursor: pointer; transition: box-shadow .15s, transform .1s; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.esc-banner:hover { box-shadow: 0 6px 20px rgba(0,0,0,.16); transform: translateY(-1px); }
.esc-banner.has-esc { background: linear-gradient(135deg,#FFF7ED,#FEF2C7); border: 1px solid #FCD34D; }
.esc-banner.no-esc  { background: linear-gradient(135deg,#F0FDF4,#DCFCE7); border: 1px solid #86EFAC; }
.esc-banner-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 5px; }
.esc-banner-title { font-weight: 800; font-size: 1.05rem; color: var(--text); margin-bottom: 2px; }
.esc-banner-sub   { font-size: .72rem; color: var(--muted); }
.esc-banner-stats { display: flex; gap: 10px; flex: 1; flex-wrap: wrap; align-items: center; justify-content: center; }
.esc-stat { text-align: center; background: rgba(255,255,255,.75); border-radius: 10px; padding: 10px 18px; min-width: 90px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.esc-stat .n { font-size: 2.2rem; font-weight: 800; line-height: 1; }
.esc-stat .l { font-size: .63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); margin-top: 3px; }
.esc-stat.t2  .n { color: #B45309; }
.esc-stat.t3  .n { color: var(--red); }
.esc-stat.sb  .n { color: #0369A1; }
.esc-stat.t3a .n { color: #7C3AED; }
.esc-stat.ok  .n { color: #16A34A; }
.esc-banner-cta { background: var(--purple); color: #fff; border: none; border-radius: 8px; padding: 12px 22px; font-family: inherit; font-size: .85rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: background .15s; letter-spacing: .1px; flex-shrink: 0; }
.esc-banner-cta:hover { background: var(--plum); }
.esc-banner.no-esc .esc-banner-cta { background: #16A34A; }
.esc-banner.no-esc .esc-banner-cta:hover { background: #15803D; }

/* Escalation summary row (top of esc tab) */
.esc-summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 18px; }
@media (max-width:860px) { .esc-summary { grid-template-columns: 1fr 1fr; } }
.esc-sum-card { background: var(--card); border-radius: 10px; box-shadow: 0 1px 6px rgba(80,29,131,.08); padding: 18px 16px; text-align: center; border-top: 4px solid var(--border); }
.esc-sum-card .n { font-size: 3rem; font-weight: 800; line-height: 1; margin-bottom: 6px; }
.esc-sum-card .l { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
.esc-sum-card .sub { font-size: .7rem; color: var(--slate); margin-top: 3px; }
.esc-sum-card.t2  { border-top-color: #D97706; } .esc-sum-card.t2  .n { color: #B45309; }
.esc-sum-card.t3  { border-top-color: var(--red); } .esc-sum-card.t3  .n { color: var(--red); }
.esc-sum-card.sb  { border-top-color: #0284C7; } .esc-sum-card.sb  .n { color: #0369A1; }
.esc-sum-card.t3a { border-top-color: #7C3AED; } .esc-sum-card.t3a .n { color: #7C3AED; }

/* Filter bar (All Open tab) */
.filter-bar { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; padding: 12px 16px; background: #F8F5FD; border-bottom: 1px solid var(--border); }
.filter-input { font-family: inherit; font-size: .8rem; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; min-width: 180px; flex: 1; outline: none; background: #fff; color: var(--text); }
.filter-input:focus { border-color: var(--purple); box-shadow: 0 0 0 2px rgba(80,29,131,.1); }
.filter-select { font-family: inherit; font-size: .78rem; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--text); cursor: pointer; outline: none; }
.filter-select:focus { border-color: var(--purple); }
.filter-label  { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); white-space: nowrap; }
.filter-clear  { font-family: inherit; font-size: .78rem; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s; }
.filter-clear:hover { background: #FFF1F2; color: var(--red); border-color: #FECACA; }
.filter-count  { font-size: .75rem; color: var(--muted); font-weight: 600; white-space: nowrap; margin-left: auto; padding: 4px 10px; background: rgba(80,29,131,.07); border-radius: 99px; }
.filter-sep    { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.pri-crit { color: #991B1B; font-weight: 700; }
.pri-high { color: #B45309; font-weight: 700; }
.pri-med  { color: #0369A1; }
.pri-low  { color: var(--muted); }

/* Footer */
.footer { text-align: center; font-size: .7rem; color: var(--slate); padding: 14px; border-top: 1px solid var(--border); margin-top: 6px; }
.footer span { color: var(--pix); font-weight: 600; }

/* Over-SLA row highlight */
tr.over-sla { background: #FFF1F2 !important; }
tr.over-sla td:first-child { border-left: 3px solid var(--red); }
.person-item.over-sla { background: #FFF1F2; border-left: 3px solid var(--red); padding-left: 9px; }
.sla-badge { display: inline-block; background: #FEE2E2; color: #991B1B; font-size: .65rem; font-weight: 700; padding: 1px 6px; border-radius: 99px; margin-left: 5px; vertical-align: middle; }

/* Print */
@media print {
  .hdr { position: static; box-shadow: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .tabs-nav, .filter-bar, .modal-overlay, .filter-clear, #ft-count { display: none !important; }
  .tab-content { display: block !important; }
  .tab-content:not(.active) { page-break-before: always; }
  .kpi:hover { transform: none; box-shadow: none; }
  body { background: #fff; }
  .card { box-shadow: none; border: 1px solid #ddd; }
}
</style>
</head>
<body>

<!-- KPI drill-down modal -->
<div id="kpi-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <div>
        <h2 id="modal-title"></h2>
        <div class="count" id="modal-count"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <table>
        <thead id="modal-thead"></thead>
        <tbody id="modal-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>

// Helpers
function e(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sClass(s) {
  return ({'Waiting for Support':'s-waiting','In Progress':'s-inprog','Pending':'s-pending',
    'Escalated Tier 2':'s-esc2','Escalated Tier 3':'s-esc3',
    'Additional Info Provided':'s-addlinfo','Request Additional Info':'s-reqinfo',
    'Gather Requirements':'s-gather','To Do':'s-todo','Done':'s-done'})[s]||'s-default';
}
function badge(s) { return `<span class="badge ${sClass(s)}">${e(s)}</span>`; }
function fmtTime(iso) { if(!iso)return''; return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}); }
function fmtDT(iso)   { if(!iso)return''; return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }
function fmtFull(iso) { if(!iso)return''; return new Date(iso).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }
function groupBy(arr, fn) { const m={}; for(const x of arr){const k=fn(x)||'Unknown'; m[k]=(m[k]||0)+1;} return Object.entries(m).sort((a,b)=>b[1]-a[1]); }
// Count business days (Mon-Fri) elapsed since an ISO date string
function bizDays(iso) {
  if (!iso) return 0;
  const start = new Date(iso); start.setHours(0,0,0,0);
  const end   = new Date();    end.setHours(0,0,0,0);
  let days = 0, cur = new Date(start);
  while (cur < end) { const d=cur.getDay(); if(d!==0&&d!==6) days++; cur.setDate(cur.getDate()+1); }
  return days;
}
const SLA_DAYS = 5;
function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelector(`[data-tab="${id}"]`)?.classList.add('active');
}

// Modal
function openModal(type) {
  const configs = {
    open:      { title:'All Open Tickets',        tickets: DATA.open,                                             dateField:'created', label:'Created',      showAge:true  },
    created:   { title:'Created Today',           tickets: DATA.created,                                          dateField:'created', label:'Time',         showAge:false },
    resolved:  { title:'Resolved Today',          tickets: DATA.resolved,                                         dateField:'resolved',label:'Time',         showAge:false },
    unassigned:{ title:'Unassigned Open Tickets', tickets: DATA.open.filter(x=>!x.assigneeId),                   dateField:'created', label:'Created',      showAge:true  },
    overSLA:   { title:`Over SLA (>${SLA_DAYS} business days)`, tickets: DATA.open.filter(x=>bizDays(x.created)>SLA_DAYS).sort((a,b)=>new Date(a.created)-new Date(b.created)), dateField:'created', label:'Created', showAge:true },
    t3active:  { title:'All Active T3 Tickets',   tickets: DATA.currentT3,                                        dateField:'updated', label:'Last Updated', showAge:true  },
  };
  const cfg = configs[type];
  document.getElementById('modal-title').textContent = cfg.title;
  document.getElementById('modal-count').textContent = `${cfg.tickets.length} ticket${cfg.tickets.length!==1?'s':''}`;
  const colSpan = cfg.showAge ? 7 : 6;
  document.getElementById('modal-thead').innerHTML =
    `<tr><th>Key</th><th>Summary</th><th>Status</th><th>Priority</th>${cfg.showAge?'<th>Age</th>':''}<th>Assignee</th><th>${cfg.label}</th></tr>`;
  document.getElementById('modal-tbody').innerHTML = cfg.tickets.length
    ? cfg.tickets.map(x => {
        const asgn = x.assignee ? e(x.assignee) : '<span class="ua">Unassigned</span>';
        const pri  = x.priority || 'None';
        const age  = cfg.showAge ? bizDays(x.created) : 0;
        const overS = cfg.showAge && age > SLA_DAYS;
        const ageCell = cfg.showAge
          ? `<td>${overS?`<span style="color:var(--red);font-weight:700">${age}d</span><span class="sla-badge">Over SLA</span>`:`${age}d`}</td>`
          : '';
        return `<tr class="${overS?'over-sla':''}">
          <td><a href="${e(x.url)}" target="_blank">${e(x.key)}</a></td>
          <td>${e(x.summary)}</td>
          <td>${badge(x.status)}</td>
          <td class="${priorityClass(pri)}">${e(pri)}</td>
          ${ageCell}
          <td>${asgn}</td>
          <td>${fmtTime(x[cfg.dateField])}</td>
        </tr>`;
      }).join('')
    : `<tr><td colspan="${colSpan}" class="no-data">No tickets in this category</td></tr>`;
  document.getElementById('kpi-modal').classList.add('open');
}

// Person data
function personData(accountId) {
  const myOpen     = DATA.open.filter(x=>x.assigneeId===accountId);
  const myCreated  = DATA.created.filter(x=>x.assigneeId===accountId);
  const myResolved = DATA.resolved.filter(x=>x.assigneeId===accountId);
  const allAct     = DATA.activity[accountId]||[];
  const myActivity = allAct
    .filter(a=>a.assigneeId!==accountId)
    .reduce((acc,a)=>{ if(!acc.find(x=>x.key===a.key))acc.push(a); return acc; },[]);
  return { myOpen, myCreated, myResolved, myActivity };
}

    : `<div class="no-act">None resolved today</div>`;

  const overSLACount = myOpen.filter(x => bizDays(x.created) > SLA_DAYS).length;

    ? myOpen.slice(0,6).map(x=>{

        <span class="pt">${badge(x.status)}</span></div>`;
      }).join('')
        + (myOpen.length>6?`<div class="no-act more-btn" onclick="openPersonModal('${tier}',${memberIdx},'open')">+${myOpen.length-6} more open tickets &rarr;</div>`:'')
    : `<div class="no-act">No open tickets assigned</div>`;

  const touchedRows = myActivity.length
    ? myActivity.slice(0,4).map(a=>`<div class="person-item touched">
        <span class="pk"><a href="${e(a.url)}" target="_blank">${e(a.key)}</a></span>
        <span class="ps">${e(a.summary)}</span>
        <span class="pt smol">${e(a.toVal)} &middot; ${fmtTime(a.when)}</span></div>`).join('')
        + (myActivity.length>4?`<div class="no-act more-btn" onclick="openPersonModal('${tier}',${memberIdx},'touched')">+${myActivity.length-4} more &rarr;</div>`:'')

  return `<div class="person-card ${tier==='T1'?'t1':''}">

      </div>
    </div>
    <div class="person-stats">
      <div class="pstat"><span class="n ${myOpen.length===0?'zero':''}">${myOpen.length}</span>Open</div>

      ${overSLACount>0?`<div class="pstat"><span class="n" style="color:var(--red)">${overSLACount}</span>Over SLA</div>`:''}

    ${openRows}
    ${myActivity.length?`<div class="person-sec-title">&#9675; Also Worked On</div>${touchedRows}`:''}
  </div>`;
}

  const priOrderMap = {Critical:0,Highest:1,High:2,Medium:3,Low:4,Lowest:5,None:6};

  const escBanner = `<div class="esc-banner ${hasEsc?'has-esc':'no-esc'}" onclick="showTab('esc')">

      <div class="esc-banner-sub">${escBannerSub}</div>

  </div>`;

  return `

    <div class="kpi k-open"     onclick="openModal('open')">

    </div>
    <div class="kpi k-created"  onclick="openModal('created')">
      <div class="kpi-label">Created Today</div>
      <div class="kpi-val">${created.length}</div>
      <div class="kpi-sub">new requests</div>
      <div class="kpi-hint">Click for breakdown &rarr;</div>
    </div>
    <div class="kpi k-resolved" onclick="openModal('resolved')">
      <div class="kpi-label">Resolved Today</div>
      <div class="kpi-val">${resolved.length}</div>
      <div class="kpi-sub">closed today</div>
      <div class="kpi-hint">Click for breakdown &rarr;</div>

      <div class="kpi-hint">Click for breakdown &rarr;</div>

  </div>

function priorityOrder(p) {
  return ({'Critical':0,'Highest':1,'High':2,'Medium':3,'Low':4,'Lowest':5,'None':6})[p] ?? 5;
}
function priorityClass(p) {
  if (!p || p==='None') return 'pri-low';
  if (p==='Critical'||p==='Highest') return 'pri-crit';
  if (p==='High')   return 'pri-high';
  if (p==='Medium') return 'pri-med';
  return 'pri-low';
}

function filterAllTickets() {
  const search   = (document.getElementById('ft-search')?.value   || '').toLowerCase().trim();
  const status   = document.getElementById('ft-status')?.value    || '';
  const tier     = document.getElementById('ft-tier')?.value      || '';
  const assignee = document.getElementById('ft-assignee')?.value  || '';
  const priority = document.getElementById('ft-priority')?.value  || '';
  const sla      = document.getElementById('ft-sla')?.value       || '';
  const sort     = document.getElementById('ft-sort')?.value      || 'created-desc';

  let tickets = DATA.open.filter(x => {
    if (search && !x.key.toLowerCase().includes(search) && !(x.summary||'').toLowerCase().includes(search)) return false;
    if (status   && x.status                    !== status)   return false;
    if (tier     && (x.tier||'T1')              !== tier)     return false;
    if (assignee && (x.assignee||'Unassigned')  !== assignee) return false;
    if (priority && (x.priority||'None')        !== priority) return false;
    if (sla === 'over' && bizDays(x.created) <= SLA_DAYS) return false;
    if (sla === 'ok'   && bizDays(x.created) >  SLA_DAYS) return false;
    return true;
  });

  tickets = tickets.slice().sort((a,b) => {
    switch(sort) {
      case 'created-asc':   return new Date(a.created) - new Date(b.created);
      case 'age-desc':      { const oa=bizDays(a.created)>SLA_DAYS,ob=bizDays(b.created)>SLA_DAYS; if(oa!==ob)return oa?-1:1; return new Date(a.created)-new Date(b.created); }
      case 'updated-desc':  return new Date(b.updated) - new Date(a.updated);
      case 'priority-asc':  return priorityOrder(a.priority||'None') - priorityOrder(b.priority||'None');
      case 'assignee-asc':  return (a.assignee||'Unassigned').localeCompare(b.assignee||'Unassigned');
      case 'status-asc':    return (a.status||'').localeCompare(b.status||'');
      default:              return new Date(b.created) - new Date(a.created);
    }
  });

  const tbody   = document.getElementById('all-tickets-body');
  const countEl = document.getElementById('ft-count');
  const hasFilter = search || status || tier || assignee || priority || sla;
  if (countEl) countEl.textContent = hasFilter
    ? `${tickets.length} of ${DATA.open.length} tickets`
    : `${DATA.open.length} tickets`;

  if (!tbody) return;
  if (tickets.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="no-data">No tickets match the current filters &mdash; <a href="#" onclick="clearAllFilters();return false">clear filters</a></td></tr>';
    return;
  }
  tbody.innerHTML = tickets.map(x => {
    const tierHtml = x.tier==='T2'
      ? '<span class="tier-t2">T2</span>'
      : '<span class="tier-t1">T1</span>';
    const asgn  = x.assignee ? e(x.assignee) : '<span class="ua">Unassigned</span>';
    const pri   = x.priority || 'None';
    const age   = bizDays(x.created);
    const overSLA = age > SLA_DAYS;
    const ageHtml = overSLA
      ? `<span style="color:var(--red);font-weight:700">${age}d</span><span class="sla-badge">Over SLA</span>`
      : `${age}d`;
    return `<tr class="${overSLA ? 'over-sla' : ''}">
      <td style="white-space:nowrap"><a href="${e(x.url)}" target="_blank">${e(x.key)}</a></td>
      <td style="white-space:normal;max-width:400px">${e(x.summary)}</td>
      <td>${badge(x.status)}</td>
      <td>${tierHtml}</td>
      <td>${asgn}</td>
      <td class="${priorityClass(pri)}">${e(pri)}</td>
      <td style="white-space:nowrap">${ageHtml}</td>
      <td style="white-space:nowrap">${fmtDT(x.created)}</td>
    </tr>`;
  }).join('');
}

function clearAllFilters() {
  const el = id => document.getElementById(id);
  if (el('ft-search'))   el('ft-search').value   = '';
  if (el('ft-status'))   el('ft-status').value   = '';
  if (el('ft-tier'))     el('ft-tier').value      = '';
  if (el('ft-assignee')) el('ft-assignee').value  = '';
  if (el('ft-priority')) el('ft-priority').value  = '';
  if (el('ft-sla'))      el('ft-sla').value       = '';
  if (el('ft-sort'))     el('ft-sort').value      = 'created-desc';
  filterAllTickets();
}

        <option value="">All</option>${tierOpts}
      </select>
      <span class="filter-label">Assignee</span>
      <select id="ft-assignee" class="filter-select" onchange="filterAllTickets()">
        <option value="">All</option>${assigneeOpts}
      </select>
      <span class="filter-label">Priority</span>
      <select id="ft-priority" class="filter-select" onchange="filterAllTickets()">
        <option value="">All</option>${priorityOpts}
      </select>
      <span class="filter-label">SLA</span>
      <select id="ft-sla" class="filter-select" onchange="filterAllTickets()">
        <option value="">All</option>

    </div>
    <table>
      <thead><tr>
        <th>Key</th><th>Summary</th><th>Status</th><th>Tier</th>

      <tbody id="all-tickets-body"></tbody>
    </table>
  </div>`;
}

// Countdown â€” reloads the page when the next generation is due
(function(){
  const next = new Date(DATA.generatedAt);
  next.setHours(next.getHours()+1);
  function tick(){
    const d = Math.floor((next - Date.now()) / 1000);
    if (d <= 0) { location.reload(); return; }
    const el = document.getElementById('countdown');
    if (el) el.textContent = String(Math.floor(d/60)).padStart(2,'0') + ':' + String(d%60).padStart(2,'0');
  }
  tick(); setInterval(tick,1000);
})();
