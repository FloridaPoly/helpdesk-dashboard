<head>

<style>
:root {
  --purple: #501D83; --plum: #2E1A4A; --blue: #009FDF; --pix: #B095DE;
  --slate: #A7B4C3; --bg: #F0EDF6; --card: #FFFFFF; --text: #1A0D2E;
  --muted: #586066; --border: #E4DFF0; --green: #22C55E;
  --amber: #F59E0B; --red: #EF4444; --orange: #F97316;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Exo 2','Segoe UI',system-ui,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.hdr { background: linear-gradient(135deg,var(--plum) 0%,var(--purple) 100%); color: #fff; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 3px 12px rgba(0,0,0,.35); }
.hdr-brand { display: flex; align-items: center; gap: 12px; padding: 16px 0; }
.hdr-logo { height: 40px; width: auto; flex-shrink: 0; display: block; }
.hdr-title h1 { font-size: 1.1rem; font-weight: 700; }
.hdr-title p  { font-size: .72rem; opacity: .65; margin-top: 2px; }
.hdr-meta { text-align: right; font-size: .75rem; opacity: .8; line-height: 1.6; }
.hdr-meta strong { display: block; font-size: .9rem; opacity: 1; color: var(--pix); }
.range-pill { display: inline-block; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: #fff; font-size: .7rem; font-weight: 600; padding: 3px 10px; border-radius: 99px; margin-top: 4px; }

/* Tabs */
.tabs-nav { background: var(--plum); display: flex; padding: 0 28px; border-bottom: 2px solid rgba(0,159,223,.35); position: sticky; top: 0; z-index: 200; }
.tab-btn { padding: 10px 18px; font-family: inherit; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.5); background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; transition: color .15s,border-color .15s; white-space: nowrap; }
.tab-btn:hover { color: rgba(255,255,255,.85); }
.tab-btn.active { color: #fff; border-bottom-color: var(--blue); }
.tab-badge { display: inline-block; background: rgba(0,159,223,.2); color: var(--blue); font-size: .65rem; font-weight: 700; padding: 1px 5px; border-radius: 99px; margin-left: 4px; }
.tab-btn.active .tab-badge { background: rgba(0,159,223,.35); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Layout */
.wrap { max-width: 1500px; margin: 0 auto; padding: 22px 24px; }

/* KPI row */
.kpi-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width:1100px) { .kpi-row { grid-template-columns: repeat(3,1fr); } }
.kpi { background: var(--card); border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 6px rgba(80,29,131,.08); border-left: 5px solid var(--border); }
.kpi-label { font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 7px; }
.kpi-val   { font-size: 2.4rem; font-weight: 800; line-height: 1; }
.kpi-sub   { font-size: .7rem; color: var(--slate); margin-top: 5px; }
.kpi.k-res  { border-left-color: var(--green); }  .kpi.k-res .kpi-val  { color: #16A34A; }
.kpi.k-cre  { border-left-color: var(--blue); }   .kpi.k-cre .kpi-val  { color: #0076A8; }
.kpi.k-sla  { border-left-color: var(--purple); } .kpi.k-sla .kpi-val  { color: var(--purple); }
.kpi.k-avg  { border-left-color: var(--amber); }  .kpi.k-avg .kpi-val  { color: #B45309; }
.kpi.k-open { border-left-color: var(--slate); }  .kpi.k-open .kpi-val { color: var(--muted); }
.kpi.k-sat  { border-left-color: #F59E0B; }       .kpi.k-sat .kpi-val  { color: #B45309; }

/* Cards */
.card { background: var(--card); border-radius: 10px; box-shadow: 0 1px 6px rgba(80,29,131,.08); margin-bottom: 16px; overflow: hidden; }
.card-hdr { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-hdr h2 { font-size: .88rem; font-weight: 700; }
.card-hdr.purple { background: linear-gradient(90deg,var(--plum),var(--purple)); color: #fff; border-bottom: none; }
.card-hdr.purple h2 { color: #fff; }
.card-hdr.blue   { background: linear-gradient(90deg,#0076A8,var(--blue)); color: #fff; border-bottom: none; }
.card-hdr.blue h2 { color: #fff; }
.chip { background: rgba(80,29,131,.1); color: var(--purple); font-size: .68rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
.card-hdr.purple .chip, .card-hdr.blue .chip { background: rgba(255,255,255,.2); color: #fff; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: .83rem; }
th { padding: 9px 13px; text-align: left; font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); background: #F8F5FD; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 8px 13px; border-bottom: 1px solid #F5F2FA; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAF8FE; }
.no-data { text-align: center; color: var(--slate); font-style: italic; padding: 22px !important; }
.smol { font-size: .72rem; color: var(--muted); }
.ua   { color: #B45309; font-weight: 600; }

/* Rank badges */
.rnk-1 { background: #FFF8DC; color: #8B6914; border: 1px solid #E8C84A; font-weight: 800; font-size: .82rem; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
.rnk-2 { background: #F4F4F4; color: #5A5A5A; border: 1px solid #C0C0C0; font-weight: 800; font-size: .82rem; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
.rnk-3 { background: #FDF2E9; color: #8B4513; border: 1px solid #CD853F; font-weight: 800; font-size: .82rem; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
.rnk-n { color: var(--muted); font-weight: 700; font-size: .82rem; padding: 3px 6px; white-space: nowrap; }

/* Bars */
.bar-wrap  { background: #EDE9FE; border-radius: 99px; height: 8px; min-width: 60px; overflow: hidden; }
.bar-inner { height: 8px; border-radius: 99px; min-width: 4px; transition: width .4s; }
.bar-purple { background: var(--purple); } .bar-blue   { background: var(--blue); }
.bar-green  { background: var(--green); } .bar-amber  { background: var(--amber); }
.bar-red    { background: var(--red); }

/* Status/priority badges */
.badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: .68rem; font-weight: 700; white-space: nowrap; }
.s-waiting  { background:#FEF3C7;color:#92400E; } .s-inprog   { background:#EDE9FE;color:#5B21B6; }
.s-pending  { background:#E0F2FE;color:#075985; } .s-esc2     { background:#FFEDD5;color:#C2410C; }
.s-esc3     { background:#FEE2E2;color:#991B1B; } .s-addlinfo { background:#CFFAFE;color:#0E7490; }
.s-todo     { background:#F1F5F9;color:#475569; } .s-done     { background:#DCFCE7;color:#15803D; }
.s-default  { background:#F1F5F9;color:#475569; }
.p-highest  { background:#FEE2E2;color:#991B1B; } .p-high     { background:#FFEDD5;color:#C2410C; }
.p-medium   { background:#FEF3C7;color:#92400E; } .p-low      { background:#F0FDF4;color:#166534; }
.p-lowest   { background:#F8FAFC;color:#475569; } .p-none     { background:#F1F5F9;color:#475569; }
.sla-ok   { background:#DCFCE7;color:#166534;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:4px; }
.sla-fail { background:#FEE2E2;color:#991B1B;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:4px; }

/* Tier badges */
.tier-t1 { display:inline-block;font-size:.63rem;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(0,159,223,.1);color:#0369A1; }
.tier-t2 { display:inline-block;font-size:.63rem;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(80,29,131,.1);color:var(--purple); }

/* Satisfaction stars */
.stars { color: #F59E0B; letter-spacing: 1px; font-size: .9rem; }
.stars-sm { color: #F59E0B; font-size: .75rem; }

/* Person cards */
.people-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(400px,1fr)); gap: 16px; }
@media (max-width:900px) { .people-grid { grid-template-columns: 1fr; } }
.person-card { background: var(--card); border-radius: 10px; box-shadow: 0 1px 6px rgba(80,29,131,.08); overflow: hidden; border-top: 3px solid var(--purple); transition: box-shadow .15s,transform .1s; }
.person-card.t1 { border-top-color: var(--blue); }
.person-card:hover { box-shadow: 0 4px 18px rgba(80,29,131,.15); transform: translateY(-1px); }
.person-hdr { padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; background: #FDFBFF; border-bottom: 1px solid var(--border); cursor: pointer; }
.person-hdr:hover { background: #F5F0FF; }
.person-name { font-weight: 700; font-size: .95rem; }
.person-role { font-size: .69rem; color: var(--muted); margin-top: 2px; }
.person-stats { display: flex; border-bottom: 1px solid var(--border); }
.pstat { flex: 1; text-align: center; padding: 10px 6px; border-right: 1px solid var(--border); font-size: .65rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
.pstat:last-child { border-right: none; }
.pstat .n { display: block; font-size: 1.3rem; font-weight: 800; color: var(--text); line-height: 1.15; margin-bottom: 1px; }
.pstat .n.zero  { color: var(--slate); }
.pstat .n.green { color: #16A34A; }
.pstat .n.blue  { color: var(--blue); }
.pstat .n.amber { color: #B45309; }
.pstat .n.red   { color: var(--red); }
.person-sec-title { padding: 6px 14px; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); background: #F8F5FD; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.no-act { padding: 10px 14px; font-size: .78rem; color: var(--slate); font-style: italic; }
.view-btn { width:100%;padding:9px 14px;background:none;border:none;color:var(--blue);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;text-align:left;border-top:1px solid var(--border);display:block;transition:background .15s; }
.view-btn:hover { background:#F0F9FF; }

/* Chart containers */
.chart-wrap  { position:relative;padding:10px 14px 12px; }
.chart-wrap canvas { max-height:90px; }
.chart-tall  { position:relative;padding:12px 16px 14px; }
.chart-tall canvas { max-height:220px; }
.chart-med   { position:relative;padding:10px 16px 12px; }
.chart-med canvas { max-height:160px; }

/* Two-col */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width:900px) { .two-col { grid-template-columns: 1fr; } }

/* Person page (full-screen overlay) */
#person-page { position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;display:none; }
.pp-topbar { background: linear-gradient(135deg,var(--plum),var(--purple)); color:#fff; padding:0 28px; display:flex; align-items:center; gap:14px; position:sticky;top:0;z-index:10;box-shadow:0 3px 10px rgba(0,0,0,.3); }
.pp-back { background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 14px;border-radius:6px;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;transition:background .15s;flex-shrink:0; }
.pp-back:hover { background:rgba(255,255,255,.28); }
.pp-topbar-info { padding:13px 0;flex:1; }
.pp-topbar-name { font-size:1.15rem;font-weight:800; }
.pp-topbar-sub  { font-size:.72rem;opacity:.7;margin-top:2px; }
.pp-topbar-rank { font-size:1rem;font-weight:800;flex-shrink:0;text-align:right; }

/* Satisfaction comment cards */
.sat-comment { background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:.82rem; }
.sat-comment .sat-stars { color:#F59E0B;margin-bottom:4px; }
.sat-comment .sat-text  { color:var(--text);line-height:1.5; }
.sat-comment .sat-date  { font-size:.7rem;color:var(--muted);margin-top:4px; }

/* Modal */
.modal-overlay { position:fixed;inset:0;background:rgba(46,26,74,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--card);border-radius:12px;width:100%;max-width:1000px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden; }
.modal-hdr { padding:14px 20px;background:linear-gradient(135deg,var(--plum),var(--purple));color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
.modal-hdr h2 { font-size:1rem;font-weight:700; }
.modal-hdr .count { font-size:.78rem;opacity:.75;margin-top:2px; }
.modal-close { background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:6px;font-size:1.1rem;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:background .15s; }
.modal-close:hover { background:rgba(255,255,255,.3); }
.modal-body { overflow-y:auto;flex:1; }
.modal-body table { font-size:.82rem; }
.modal-body td { white-space:normal;max-width:none; }
.modal-body td:first-child { white-space:nowrap; }

.footer { text-align:center;font-size:.7rem;color:var(--slate);padding:16px;border-top:1px solid var(--border);margin-top:8px; }
.footer span { color:var(--pix);font-weight:600; }

/* Over-SLA row highlight */
tr.over-sla { background: #FFF1F2 !important; }
tr.over-sla td:first-child { border-left: 3px solid #EF4444; }
.sla-badge { display:inline-block;background:#FEE2E2;color:#991B1B;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:5px;vertical-align:middle; }

/* No-activity banner */
.no-activity-banner { background:#F8F7FF;border:1px dashed #C4B5DF;border-radius:8px;padding:10px 14px;margin:10px 14px;font-size:.8rem;color:#7C6FAD;text-align:center; }

/* Print */
@media print {
  .hdr { box-shadow:none; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .tabs-nav, .filter-bar, .modal-overlay, #person-page { display:none !important; }
  .tab-content { display:block !important; }
  .tab-content:not(.active) { page-break-before:always; }
  body { background:#fff; }
  .card { box-shadow:none; border:1px solid #ddd; }
  .person-card { break-inside:avoid; }
}
</style>
</head>

// ── Helpers ────────────────────────────────────────────────
function e(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sClass(s) {
  return ({'Waiting for Support':'s-waiting','In Progress':'s-inprog','Pending':'s-pending',
    'Escalated Tier 2':'s-esc2','Escalated Tier 3':'s-esc3',
    'Additional Info Provided':'s-addlinfo','Request Additional Info':'s-reqinfo',
    'To Do':'s-todo','Done':'s-done'})[s]||'s-default';
}
function pClass(p) {
  return ({'Highest':'p-highest','High':'p-high','Medium':'p-medium','Low':'p-low','Lowest':'p-lowest','None':'p-none'})[p]||'p-none';
}
function badge(s)  { return `<span class="badge ${sClass(s)}">${e(s)}</span>`; }
function pbadge(p) { return `<span class="badge ${pClass(p)}">${e(p)}</span>`; }
function tierPill(t) {
  if (!t) return '';
  if (t==='T3') return '<span style="display:inline-block;font-size:.63rem;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(239,68,68,.1);color:#991B1B">T3</span>';
  if (t==='T2') return '<span class="tier-t2">T2</span>';
  return '<span class="tier-t1">T1</span>';
}
function fmtDate(iso){ if(!iso)return''; return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDT(iso)  { if(!iso)return''; return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }
function statKey(m)  { return m.accountId || ('noid_'+m.name); }

// Stars: uses HTML entity &#9733; (filled) and &#9734; (empty) - safe in any encoding
function starHtml(rating, size) {
  if (rating==null) return '<span style="color:var(--slate)">No ratings</span>';
  const r = Math.round(rating);
  const cls = size==='sm' ? 'stars-sm' : 'stars';
  let s = '';
  for (let i=1;i<=5;i++) s += `<span class="${cls}">${i<=r?'&#9733;':'&#9734;'}</span>`;
  return s + ` <span style="font-size:.75rem;color:var(--muted);margin-left:2px">${rating}</span>`;
}

// ── Ranking: tier-aware sort
//   T1: primary=commentCount desc, secondary=resolvedCount desc, tertiary=avgResDays asc
//   T2: primary=resolvedCount desc, secondary=slaRate desc, tertiary=avgResDays asc
// Returns object { ranks: {sk->position}, sorted: [member,...] }
function computeRanks(members, tier) {
  const valid = members.filter(m => DATA.stats[statKey(m)]);
  const sorted = [...valid].sort((a,b) => {
    const sa = DATA.stats[statKey(a)], sb = DATA.stats[statKey(b)];
    if (tier === 'T1') {
      const ca = sa.commentCount??0, cb = sb.commentCount??0;
      if (cb !== ca) return cb - ca;
      if (sb.resolvedCount !== sa.resolvedCount) return sb.resolvedCount - sa.resolvedCount;
    } else {
      if (sb.resolvedCount !== sa.resolvedCount) return sb.resolvedCount - sa.resolvedCount;
      const slaA = sa.slaRate??-1, slaB = sb.slaRate??-1;
      if (slaB !== slaA) return slaB - slaA;
    }
    const avgA = sa.avgResDays??9999, avgB = sb.avgResDays??9999;
    return avgA - avgB;
  });
  const ranks = {};
  sorted.forEach((m,i) => { ranks[statKey(m)] = i+1; });
  return { ranks, sorted };
}

function rankBadge(n) {
  if (n===1) return `<span class="rnk-1">#1</span>`;
  if (n===2) return `<span class="rnk-2">#2</span>`;
  if (n===3) return `<span class="rnk-3">#3</span>`;
  return `<span class="rnk-n">#${n}</span>`;
}

// ── Team helpers ────────────────────────────────────────────
function teamSlaRate(members) {
  const valid = members.filter(m=>DATA.stats[statKey(m)]&&DATA.stats[statKey(m)].resolvedCount>0);
  if (!valid.length) return null;
  const total = valid.reduce((s,m)=>s+DATA.stats[statKey(m)].resolvedCount,0);
  const ok    = valid.reduce((s,m)=>s+DATA.stats[statKey(m)].slaCount,0);
  return total ? Math.round(ok/total*100*10)/10 : null;
}
function teamAvgRes(members) {
  const valid = members.filter(m=>DATA.stats[statKey(m)]&&DATA.stats[statKey(m)].resolvedCount>0&&DATA.stats[statKey(m)].avgResDays!=null);
  if (!valid.length) return null;
  const total  = valid.reduce((s,m)=>s+DATA.stats[statKey(m)].resolvedCount,0);
  const sumDays= valid.reduce((s,m)=>s+DATA.stats[statKey(m)].avgResDays*DATA.stats[statKey(m)].resolvedCount,0);
  return total ? Math.round(sumDays/total*10)/10 : null;
}
function teamAvgSat(members) {
  const valid = members.filter(m=>DATA.stats[statKey(m)]&&DATA.stats[statKey(m)].satCount>0);
  if (!valid.length) return null;
  const total = valid.reduce((s,m)=>s+DATA.stats[statKey(m)].satCount,0);
  const sum   = valid.reduce((s,m)=>s+DATA.stats[statKey(m)].avgSat*DATA.stats[statKey(m)].satCount,0);
  return total ? Math.round(sum/total*100)/100 : null;
}

// ── Compute monthly breakdown from resolved array ───────────
function monthlyBreakdown(s) {
  const months = {};
  for (const t of s.resolved) {
    const mo = t.resolved.substring(0,7);
    if (!months[mo]) months[mo]={resolved:0,totalDays:0,slaOk:0,satTotal:0,satCount:0};
    months[mo].resolved++;
    months[mo].totalDays += t.resDays;
    if (t.slaOk) months[mo].slaOk++;
    if (t.satRating!=null){ months[mo].satTotal+=t.satRating; months[mo].satCount++; }
  }
  return Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).map(([mo,d])=>({
    mo, label: new Date(mo+'-15').toLocaleDateString('en-US',{month:'short',year:'numeric'}),
    resolved: d.resolved,
    avgDays:  d.resolved ? Math.round(d.totalDays/d.resolved*10)/10 : null,
    slaRate:  d.resolved ? Math.round(d.slaOk/d.resolved*100) : null,
    avgSat:   d.satCount ? Math.round(d.satTotal/d.satCount*10)/10 : null
  }));
}

// ── Priority breakdown ──────────────────────────────────────
function priorityBreakdown(s) {
  const c = {};
  for (const t of s.resolved) c[t.priority]=(c[t.priority]||0)+1;
  const order = {Highest:0,High:1,Medium:2,Low:3,Lowest:4,None:5};
  return Object.entries(c).sort((a,b)=>(order[a[0]]??6)-(order[b[0]]??6));
}

// ── Satisfaction comments list ──────────────────────────────
function satComments(s) {
  return s.resolved.filter(t=>t.satRating!=null&&t.satComment).slice(0,10);
}

// ── Extra computed breakdowns for person page ───────────────
function categoryBreakdown(s) {
  const c = {};
  for (const t of s.resolved) { const k=t.category||'Uncategorized'; c[k]=(c[k]||0)+1; }
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}
function requestTypeBreakdown(s) {
  const c = {};
  for (const t of s.resolved) { const k=t.requestType||'Unknown'; c[k]=(c[k]||0)+1; }
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}
function dayOfWeekBreakdown(s) {
  // Returns [Mon,Tue,Wed,Thu,Fri] counts
  const days = [0,0,0,0,0];
  for (const t of s.resolved) {
    const d = new Date(t.resolved).getDay(); // 0=Sun,1=Mon...
    if (d>=1 && d<=5) days[d-1]++;
  }
  return days;
}
// Rolling 4-week average resolution time (for velocity trend)
function velocityTrend(s) {
  const byWeek = {};
  for (const t of s.resolved) {
    const w = t.resolved.substring(0,4)+'-W'+String(getISOWeekNum(new Date(t.resolved))).padStart(2,'0');
    if (!byWeek[w]) byWeek[w]=[];
    byWeek[w].push(t.resDays);
  }
  const weeks = DATA.allWeeks;
  const rolling = [];
  for (let i=0;i<weeks.length;i++) {
    const window = weeks.slice(Math.max(0,i-3),i+1);
    const allDays = window.flatMap(w=>byWeek[w]||[]);
    rolling.push(allDays.length ? Math.round(allDays.reduce((a,b)=>a+b,0)/allDays.length*10)/10 : null);
  }
  return rolling;
}
function getISOWeekNum(d) {
  const date = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

function buildPersonPage(member, sk, s, tier, rank) {
  const tierBadge = tier==='T1'
    ? '<span class="tier-t1">T1 &middot; Student Worker</span>'
    : '<span class="tier-t2">T2 &middot; Full-time Staff</span>';

  const rangeLbl = fmtDate(DATA.startDate)+' \u2013 '+fmtDate(DATA.endDate);

  // Monthly table
  const months = monthlyBreakdown(s);
  const monthRows = months.map(mo=>{

    return `<tr style="cursor:pointer" onclick="openModalMonth('${e(sk)}','${mo.mo}','${mo.label}')" title="Click to view ${mo.resolved} ticket${mo.resolved!==1?'s':''} for ${mo.label}">

      <td style="text-align:center;${rc}">${mo.avgDays!=null?mo.avgDays+'d':'&#8212;'}</td>
      <td style="text-align:center;${sc}">${mo.slaRate!=null?mo.slaRate+'%':'&#8212;'}</td>
      <td style="text-align:center">${mo.avgSat!=null?starHtml(mo.avgSat,'sm'):'&#8212;'}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" class="no-data">No resolved tickets in this period</td></tr>';

  // Category breakdown table
  const catBkd = categoryBreakdown(s);
  const maxCat = Math.max(1,...catBkd.map(c=>c[1]));
  const catRows = catBkd.map(([cat,n])=>`<tr>
    <td style="font-weight:500">${e(cat)}</td>
    <td><div style="display:flex;align-items:center;gap:8px">
      <div class="bar-wrap" style="flex:1"><div class="bar-inner bar-blue" style="width:${Math.round(n/maxCat*100)}%"></div></div>
      <span style="font-weight:700;min-width:22px;text-align:right">${n}</span>
    </div></td>
    <td style="color:var(--muted);font-size:.75rem;text-align:right">${Math.round(n/s.resolvedCount*100)}%</td>
  </tr>`).join('') || '<tr><td colspan="3" class="no-data">No data</td></tr>';

  // Request type table
  const reqBkd = requestTypeBreakdown(s);
  const maxReq = Math.max(1,...reqBkd.map(r=>r[1]));
  const reqRows = reqBkd.map(([rt,n])=>`<tr>
    <td style="font-weight:500;white-space:normal">${e(rt)}</td>
    <td><div style="display:flex;align-items:center;gap:8px">
      <div class="bar-wrap" style="flex:1"><div class="bar-inner bar-purple" style="width:${Math.round(n/maxReq*100)}%"></div></div>
      <span style="font-weight:700;min-width:22px;text-align:right">${n}</span>
    </div></td>
    <td style="color:var(--muted);font-size:.75rem;text-align:right">${Math.round(n/s.resolvedCount*100)}%</td>
  </tr>`).join('') || '<tr><td colspan="3" class="no-data">No data</td></tr>';

  // Priority breakdown
  const priBkd = priorityBreakdown(s);
  const maxPri = Math.max(1,...priBkd.map(p=>p[1]));
  const priRows = priBkd.map(([p,n])=>`<tr>
    <td>${pbadge(p)}</td>
    <td><div style="display:flex;align-items:center;gap:8px">
      <div class="bar-wrap" style="flex:1"><div class="bar-inner bar-purple" style="width:${Math.round(n/maxPri*100)}%"></div></div>
      <span style="font-weight:700;min-width:22px;text-align:right">${n}</span>
    </div></td>
  </tr>`).join('') || '<tr><td colspan="2" class="no-data">No data</td></tr>';

  // Satisfaction comments
  const comments = satComments(s);
  const commentHtml = comments.length
    ? comments.map(t=>`<div class="sat-comment">
        <div class="sat-stars">${starHtml(t.satRating,'')}</div>
        <div class="sat-text">${e(t.satComment)}</div>
        <div class="sat-date">${fmtDT(t.resolved)}</div>
      </div>`).join('')
    : '<div class="no-act">No customer comments recorded for this period.</div>';

  // Open tickets
  const openRows = s.open.length
    ? s.open.map(t=>`<tr class="${t.overSLA?'over-sla':''}">
        <td style="white-space:nowrap"><a href="${e(t.url)}" target="_blank">${e(t.key)}</a></td>
        <td style="max-width:300px;white-space:normal"><a href="${e(t.url)}" target="_blank" style="color:var(--text)">${e(t.summary)}</a></td>
        <td>${pbadge(t.priority)}</td>
        <td>${badge(t.status)}</td>
        <td>${tierPill(t.tier)}</td>
        <td style="font-size:.75rem;color:var(--muted)">${e(t.category)}</td>
        <td style="text-align:center;font-weight:700;${t.overSLA?'color:#DC2626':''}">${t.ageDays}d</td>
        <td>${t.overSLA?'<span class="sla-fail">Over SLA</span>':'<span class="sla-ok">Within SLA</span>'}</td>
      </tr>`).join('')
    : '<tr><td colspan="8" class="no-data">No open tickets currently assigned</td></tr>';

  // Resolved table
  const resolvedRows = s.resolved.slice(0,100).map(t=>`<tr>
    <td style="white-space:nowrap"><a href="${e(t.url)}" target="_blank">${e(t.key)}</a></td>
    <td style="max-width:300px;white-space:normal"><a href="${e(t.url)}" target="_blank" style="color:var(--text)">${e(t.summary)}</a></td>
    <td>${pbadge(t.priority)}</td>
    <td>${tierPill(t.tier)}</td>
    <td style="font-size:.75rem;color:var(--muted)">${e(t.category)}</td>
    <td style="white-space:nowrap">${fmtDT(t.resolved)}</td>
    <td style="text-align:center;font-weight:700">${t.resDays}d</td>
    <td>${t.slaOk?'<span class="sla-ok">On time</span>':'<span class="sla-fail">Over SLA</span>'}</td>
    <td>${t.satRating!=null?starHtml(t.satRating,'sm'):'<span style="color:var(--slate);font-size:.7rem">&#8212;</span>'}</td>
  </tr>`).join('') || '<tr><td colspan="9" class="no-data">No resolved tickets in this period</td></tr>';
  const resolvedNote = s.resolved.length>100
    ? `<div style="padding:8px 14px;font-size:.75rem;color:var(--muted);text-align:center">Showing 100 of ${s.resolved.length}. <a href="${DATA.jiraBase}/jira/servicedesk/projects/ISD2" target="_blank">View all in Jira &rarr;</a></div>` : '';

  const hasSat = s.satCount > 0;

  // Best/worst week callout
  const wkEntries = Object.entries(s.weeklyResolved);
  const bestWk  = wkEntries.length ? wkEntries.sort((a,b)=>b[1]-a[1])[0] : null;
  const bestWkLabel = bestWk ? `${bestWk[0].replace(/^\d{4}-/,'')} (${bestWk[1]} tickets)` : '&#8212;';
  const fastestTicket = s.resolved.length ? s.resolved.reduce((a,b)=>a.resDays<b.resDays?a:b) : null;
  const slowestTicket = s.resolved.length ? s.resolved.reduce((a,b)=>a.resDays>b.resDays?a:b) : null;
  const fastestHtml = fastestTicket
    ? `<a href="${e(fastestTicket.url)}" target="_blank">${e(fastestTicket.key)}</a> &mdash; ${fastestTicket.resDays}d`
    : '&#8212;';
  const slowestHtml = slowestTicket
    ? `<a href="${e(slowestTicket.url)}" target="_blank">${e(slowestTicket.key)}</a> &mdash; ${slowestTicket.resDays}d`
    : '&#8212;';

  return `
  <div class="pp-topbar">
    <button class="pp-back" onclick="closePersonPage()">&#8592; Back</button>
    <div class="pp-topbar-info">
      <div class="pp-topbar-name">${e(member.name)}</div>
      <div class="pp-topbar-sub">${tierBadge} &nbsp;&middot;&nbsp; ${rangeLbl} &nbsp;&middot;&nbsp; SLA: &le;${DATA.slaDays} business days</div>
    </div>
    <div class="pp-topbar-rank">${rankBadge(rank)}</div>
  </div>

  <div class="wrap" style="max-width:1400px">

    <!-- KPI row -->
    <div class="kpi-row" style="margin-top:20px;grid-template-columns:repeat(8,1fr)">
      <div class="kpi k-res"><div class="kpi-label">Resolved</div><div class="kpi-val" style="color:#16A34A">${s.resolvedCount}</div><div class="kpi-sub">tickets in period</div></div>
      <div class="kpi k-cre" style="${tier==='T1'?'border-top:3px solid var(--blue)':''}"><div class="kpi-label">${tier==='T1'?'<strong>Comments</strong>':'Comments'}</div><div class="kpi-val" style="color:var(--blue)">${s.commentCount||0}</div><div class="kpi-sub">${tier==='T1'?'primary ranking metric':'in period'}</div></div>
      <div class="kpi k-avg"><div class="kpi-label">Cmt / Ticket</div><div class="kpi-val" style="color:${s.resolvedCount>0&&(s.commentCount||0)/s.resolvedCount>=2?'#16A34A':s.resolvedCount>0?'var(--blue)':'var(--slate)'}">${s.resolvedCount>0?Math.round((s.commentCount||0)/s.resolvedCount*10)/10:'&#8212;'}</div><div class="kpi-sub">engagement ratio</div></div>
      <div class="kpi k-avg"><div class="kpi-label">Avg Resolution</div><div class="kpi-val" style="color:${resColor}">${s.avgResDays!=null?s.avgResDays+'d':'&#8212;'}</div><div class="kpi-sub">median: ${s.medianResDays!=null?s.medianResDays+'d':'&#8212;'}</div></div>
      <div class="kpi k-sla"><div class="kpi-label">SLA Compliance</div><div class="kpi-val" style="color:${slaColor}">${s.slaRate!=null?s.slaRate+'%':'&#8212;'}</div><div class="kpi-sub">${s.slaCount} of ${s.resolvedCount} on time</div></div>
      <div class="kpi k-sat"><div class="kpi-label">Satisfaction</div><div class="kpi-val">${s.avgSat!=null?s.avgSat:'&#8212;'}</div><div class="kpi-sub">${s.satCount>0?s.satCount+' rating'+(s.satCount!==1?'s':''):'no ratings yet'}</div></div>
      <div class="kpi k-cre"><div class="kpi-label">Created / Assigned</div><div class="kpi-val" style="color:#0076A8">${s.createdCount}</div><div class="kpi-sub">during period</div></div>
      <div class="kpi k-open"><div class="kpi-label">Open Now</div><div class="kpi-val">${s.currentOpen}</div><div class="kpi-sub">currently assigned</div></div>
    </div>

    <!-- Highlights row -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="card" style="padding:12px 16px">
        <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px">Best Week</div>
        <div style="font-weight:700;color:var(--purple)">${bestWkLabel}</div>
      </div>
      <div class="card" style="padding:12px 16px">
        <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#16A34A;margin-bottom:6px">Fastest Ticket</div>
        <div style="font-size:.82rem">${fastestHtml}</div>
      </div>
      <div class="card" style="padding:12px 16px">
        <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#DC2626;margin-bottom:6px">Slowest Ticket</div>
        <div style="font-size:.82rem">${slowestHtml}</div>
      </div>
    </div>

    <!-- Weekly trend + monthly breakdown -->
    <div class="two-col">
      <div class="card">
        <div class="card-hdr purple"><h2>Weekly Resolved Trend</h2><span class="chip">${DATA.allWeeks.length} weeks</span></div>
        <div class="chart-tall"><canvas id="pp-weekly"></canvas></div>
      </div>
      <div class="card">
        <div class="card-hdr purple"><h2>Monthly Breakdown</h2><span class="chip">${months.length} months</span></div>
        <table>
          <thead><tr><th>Month</th><th style="text-align:center">Resolved</th><th style="text-align:center">Avg Days</th><th style="text-align:center">SLA</th><th style="text-align:center">Satisfaction</th></tr></thead>
          <tbody>${monthRows}</tbody>
        </table>
      </div>
    </div>

    <!-- Resolution time dist + day-of-week + velocity -->
    <div class="two-col">
      <div class="card">
        <div class="card-hdr blue"><h2>Resolution Time Distribution</h2></div>
        <div class="chart-med"><canvas id="pp-restime"></canvas></div>
      </div>
      <div class="card">
        <div class="card-hdr blue"><h2>Day of Week (Resolutions)</h2></div>
        <div class="chart-med"><canvas id="pp-dow"></canvas></div>
      </div>
    </div>

    <!-- Resolution velocity trend -->
    <div class="card">
      <div class="card-hdr purple"><h2>Resolution Speed Trend</h2><span class="chip">4-week rolling avg</span></div>
      <div class="chart-med"><canvas id="pp-velocity"></canvas></div>
    </div>

    <!-- Category + request type breakdowns -->
    <div class="two-col">
      <div class="card">
        <div class="card-hdr blue"><h2>Category Breakdown</h2><span class="chip">${catBkd.length} categories</span></div>
        <table><thead><tr><th>Category</th><th>Count</th><th style="text-align:right">%</th></tr></thead><tbody>${catRows}</tbody></table>
      </div>
      <div class="card">
        <div class="card-hdr blue"><h2>Request Type Breakdown</h2></div>
        <table><thead><tr><th>Request Type</th><th>Count</th><th style="text-align:right">%</th></tr></thead><tbody>${reqRows}</tbody></table>
      </div>
    </div>

    <!-- Priority breakdown -->
    <div class="card">
      <div class="card-hdr purple"><h2>Priority Breakdown</h2></div>
      <div style="max-width:480px;padding:4px 0"><table><thead><tr><th>Priority</th><th>Count</th></tr></thead><tbody>${priRows}</tbody></table></div>
    </div>

    ${hasSat ? `
    <!-- Satisfaction -->
    <div class="two-col">
      <div class="card">
        <div class="card-hdr" style="background:linear-gradient(90deg,#78350F,#B45309);color:#fff;border-bottom:none">
          <h2 style="color:#fff">Satisfaction Trend</h2>
          <span class="chip" style="background:rgba(255,255,255,.2);color:#fff">${s.satCount} ratings</span>
        </div>
        <div class="chart-med"><canvas id="pp-sat"></canvas></div>
      </div>
      <div class="card">
        <div class="card-hdr" style="background:linear-gradient(90deg,#78350F,#B45309);color:#fff;border-bottom:none">
          <h2 style="color:#fff">Customer Comments</h2>
          <span class="chip" style="background:rgba(255,255,255,.2);color:#fff">recent ${Math.min(comments.length,10)}</span>
        </div>
        <div style="padding:12px 14px;max-height:300px;overflow-y:auto">${commentHtml}</div>
      </div>
    </div>` : `
    <div class="card" style="padding:14px 18px">
      <div style="font-size:.8rem;color:var(--muted)"><strong>Customer Satisfaction:</strong> No ratings received for this period. Ensure satisfaction surveys are enabled in Jira Service Management under <em>Project Settings &rarr; Customer satisfaction</em>.</div>
    </div>`}

    <!-- Open tickets -->
    <div class="card">
      <div class="card-hdr purple"><h2>Currently Open Tickets</h2><span class="chip">${s.open.length}</span></div>
      <table>
        <thead><tr><th>Key</th><th>Summary</th><th>Priority</th><th>Status</th><th>Tier</th><th>Category</th><th style="text-align:center">Age (bus. days)</th><th>SLA</th></tr></thead>
        <tbody>${openRows}</tbody>
      </table>
    </div>

    <!-- All resolved tickets -->
    <div class="card">
      <div class="card-hdr blue"><h2>Resolved Tickets</h2><span class="chip">${s.resolvedCount}</span></div>
      <table>
        <thead><tr><th>Key</th><th>Summary</th><th>Priority</th><th>Tier</th><th>Category</th><th>Resolved</th><th style="text-align:center">Bus. Days</th><th>SLA</th><th>Rating</th></tr></thead>
        <tbody>${resolvedRows}</tbody>
      </table>
      ${resolvedNote}
    </div>

    <div class="footer">Performance review generated <span>${new Date(DATA.generatedAt).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true})}</span></div>
  </div>`;
}

// ── Init person page charts ─────────────────────────────────
function initPersonCharts(sk, s) {
  const shortWk = DATA.allWeeks.map(w=>w.replace(/^\d{4}-/,''));
  const wkData  = DATA.allWeeks.map(w=>(s.weeklyResolved[w]||0));
  const isTier2 = DATA.t2.some(m=>statKey(m)===sk);
  const lineClr = isTier2 ? '#501D83' : '#009FDF';
  const fillClr = isTier2 ? 'rgba(80,29,131,0.08)' : 'rgba(0,159,223,0.08)';

  // Weekly trend
  mkChart('pp-weekly', {
    type:'line',
    data:{ labels:shortWk, datasets:[{
      label:'Resolved', data:wkData, borderColor:lineClr, backgroundColor:fillClr,
      fill:true, tension:.4, pointRadius:DATA.allWeeks.length>16?0:3, borderWidth:2
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:i=>`${i.raw} resolved`}} },
      scales:{ x:{ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:20},grid:{display:false}}, y:{min:0,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}} }
    }
  });

  // Resolution time distribution
  mkChart('pp-restime', {
    type:'bar',
    data:{ labels:['1 day or less','2 \u2013 3 days','4 \u2013 5 days','Over '+DATA.slaDays+' days'],
      datasets:[{ label:'Tickets', data:s.resBuckets,
        backgroundColor:['rgba(34,197,94,.75)','rgba(0,159,223,.75)','rgba(245,158,11,.75)','rgba(239,68,68,.75)'],
        borderRadius:6 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:i=>`${i.raw} ticket${i.raw!==1?'s':''}`}} },
      scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{min:0,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}} }
    }
  });

  // Day of week (Mon-Fri)
  const dowData = dayOfWeekBreakdown(s);
  mkChart('pp-dow', {
    type:'bar',
    data:{ labels:['Monday','Tuesday','Wednesday','Thursday','Friday'],
      datasets:[{ label:'Resolved', data:dowData,
        backgroundColor: dowData.map(v => v===Math.max(...dowData) ? lineClr : fillClr.replace('0.08','0.55')),
        borderRadius:6 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:i=>`${i.raw} ticket${i.raw!==1?'s':''}`}} },
      scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{min:0,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}} }
    }
  });

  // Velocity trend (4-week rolling avg of resolution days)
  const velData = velocityTrend(s);
  const hasVel  = velData.some(v=>v!=null);
  if (hasVel) {
    mkChart('pp-velocity', {
      type:'line',
      data:{ labels:shortWk, datasets:[
        { label:'4-wk avg resolution (days)', data:velData, borderColor:'#F59E0B', backgroundColor:'rgba(245,158,11,0.08)',
          fill:true, tension:.4, pointRadius:DATA.allWeeks.length>16?0:3, borderWidth:2, spanGaps:true },
        { label:'SLA target', data:DATA.allWeeks.map(()=>DATA.slaDays), borderColor:'rgba(239,68,68,.5)',
          borderDash:[6,4], pointRadius:0, borderWidth:1.5, fill:false }
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:12}}, tooltip:{callbacks:{label:i=>`${i.dataset.label}: ${i.raw}d`}} },
        scales:{ x:{ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:20},grid:{display:false}}, y:{min:0,title:{display:true,text:'Business Days',font:{size:10}},ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}} }
      }
    });
  }

  // Satisfaction trend (if data available)
  if (s.satCount > 0) {
    const months = monthlyBreakdown(s);
    const satMonths = months.filter(m=>m.avgSat!=null);
    if (satMonths.length) {
      mkChart('pp-sat', {
        type:'line',
        data:{ labels:satMonths.map(m=>m.label), datasets:[{
          label:'Avg Satisfaction', data:satMonths.map(m=>m.avgSat),
          borderColor:'#F59E0B', backgroundColor:'rgba(245,158,11,0.1)',
          fill:true, tension:.4, pointRadius:4, borderWidth:2
        }]},
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false}, tooltip:{callbacks:{label:i=>`${i.raw} / 5.0`}} },
          scales:{ x:{grid:{display:false},ticks:{font:{size:10}}}, y:{min:1,max:5,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}} }
        }
      });
    }
  }
}

// ── Leaderboard table ───────────────────────────────────────
function leaderboardTable(members, barColor, tier) {
  const isT1 = tier === 'T1';
  const { ranks, sorted } = computeRanks(members, tier);
  const maxPrimary = isT1
    ? Math.max(1,...sorted.map(m=>DATA.stats[statKey(m)].commentCount||0))
    : Math.max(1,...sorted.map(m=>DATA.stats[statKey(m)].resolvedCount||0));
  const colorSLA = v => v==null?'':v>=90?'color:#16A34A;font-weight:700':v>=70?'color:#B45309;font-weight:700':'color:#DC2626;font-weight:700';
  const colorRes = v => v==null?'':v<=DATA.slaDays?'color:#16A34A':v<=DATA.slaDays*1.5?'color:#B45309':'color:#DC2626';
  const colorSat = v => v==null?'':v>=4.5?'color:#16A34A':v>=3?'color:#B45309':'color:#DC2626';

  const rows = sorted.map(m => {
    const sk = statKey(m);
    const s  = DATA.stats[sk];
    const rn = ranks[sk];
    const tierStr = isT1 ? 'T1' : 'T2';
    // Bar represents primary ranking metric
    const primaryVal = isT1 ? (s.commentCount||0) : s.resolvedCount;
    const w = Math.round(primaryVal / maxPrimary * 100);
    const commentCell = isT1
      ? `<td style="font-weight:800;color:var(--blue)">${s.commentCount||0}</td>`
      : `<td style="color:var(--muted);font-size:.8rem">${s.commentCount||0}</td>`;
    return `<tr style="cursor:pointer" onclick="showPersonPage('${e(sk)}','${tierStr}')" title="Click for full profile">
      <td style="text-align:center">${rankBadge(rn)}</td>
      <td style="font-weight:600">${e(m.name)}</td>
      <td style="min-width:140px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="bar-wrap" style="flex:1"><div class="bar-inner bar-${barColor}" style="width:${w}%"></div></div>
          <span style="font-weight:800;min-width:22px;text-align:right">${isT1?s.commentCount||0:s.resolvedCount}</span>
        </div>
      </td>
      <td>${isT1?s.resolvedCount:`<span style="${colorSLA(s.slaRate)}">${s.slaRate!=null?s.slaRate+'%':'&#8212;'}</span>`}</td>
      <td style="${colorSLA(s.slaRate)}">${isT1?`${s.slaRate!=null?s.slaRate+'%':'&#8212;'}`:s.avgResDays!=null?`<span style="${colorRes(s.avgResDays)}">${s.avgResDays}d</span>`:'&#8212;'}</td>
      <td style="${colorRes(s.avgResDays)}">${s.avgResDays!=null?s.avgResDays+'d':'&#8212;'}</td>
      <td style="${colorSat(s.avgSat)}">${s.avgSat!=null?starHtml(s.avgSat,'sm'):'&#8212;'}</td>
      <td>${s.currentOpen}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" class="no-data">No data</td></tr>';

  const col2Label = isT1 ? 'Comments (primary)' : 'Resolved';
  const col3Label = isT1 ? 'Resolved' : `SLA Rate <span class="smol">(&le;${DATA.slaDays}d)</span>`;
  const col4Label = isT1 ? `SLA Rate <span class="smol">(&le;${DATA.slaDays}d)</span>` : 'Avg Time';

  return `<table>
    <thead><tr>
      <th style="width:48px">Rank</th>
      <th>Name</th>
      <th>${col2Label}</th>
      <th>${col3Label}</th>
      <th>${col4Label}</th>
      <th>Avg Time</th>
      <th>Satisfaction</th>
      <th>Open Now</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Person card (summary grid on T1/T2 tabs) ────────────────
function personCard(member, tier, idx, ranks) {
  const sk = statKey(member);
  const s  = DATA.stats[sk];
  const t  = tier;
  const tierBadge = t==='T1'
    ? '<span class="tier-t1">T1 &middot; Student Worker</span>'
    : '<span class="tier-t2">T2 &middot; Full-time Staff</span>';

  if (!s) return `<div class="person-card ${t==='T1'?'t1':''}">
    <div class="person-hdr"><div>
      <div class="person-name">${e(member.name)}</div>
      <div class="person-role">${tierBadge}</div>
    </div></div>
    <div class="no-act">Could not resolve Jira account.</div>
  </div>`;

  const rn = ranks[sk] || '—';
  const slaColor = s.slaRate==null?'zero':s.slaRate>=90?'green':s.slaRate>=70?'amber':'red';
  const resColor = s.avgResDays==null?'zero':s.avgResDays<=DATA.slaDays?'green':s.avgResDays<=DATA.slaDays*1.5?'amber':'red';
  const cptRatio = s.resolvedCount>0 ? Math.round((s.commentCount||0)/s.resolvedCount*10)/10 : null;

  const total = s.resBuckets.reduce((a,b)=>a+b,0);
  const buckets = total
    ? [['&le;1d','bar-green'],['2&ndash;3d','bar-blue'],['4&ndash;5d','bar-amber'],['&gt;SLA','bar-red']]
        .map((cfg,i)=>{
          const p = Math.max(0,Math.round(s.resBuckets[i]/total*100));
          return `<div style="flex:1;text-align:center">
            <div style="font-size:.61rem;color:var(--muted);margin-bottom:3px">${cfg[0]}</div>
            <div style="background:#EDE9FE;border-radius:4px;height:40px;display:flex;align-items:flex-end;overflow:hidden">
              <div class="bar-inner ${cfg[1]}" style="width:100%;height:${p}%;min-height:${p?3:0}px"></div>
            </div>
            <div style="font-size:.65rem;font-weight:700;margin-top:3px">${s.resBuckets[i]}</div>
          </div>`;
        }).join('')
    : '<div style="flex:1;text-align:center;font-size:.78rem;color:var(--slate);font-style:italic;padding:8px 0">No resolved tickets</div>';

  const satLine = s.satCount>0
    ? `<div style="padding:4px 14px 8px;font-size:.78rem;color:var(--muted)">Satisfaction: ${starHtml(s.avgSat,'sm')} <span class="smol">(${s.satCount})</span></div>`
    : '';

  const canvasId = `sparkline-${t}-${idx}`;

  return `<div class="person-card ${t==='T1'?'t1':''}">
    <div class="person-hdr" onclick="showPersonPage('${e(sk)}','${t}')" title="Click to view full profile">
      <div>
        <div class="person-name">${e(member.name)}</div>
        <div class="person-role">${tierBadge}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${rankBadge(rn)}
        <span style="font-size:.7rem;color:var(--blue);font-weight:600">View &rarr;</span>
      </div>
    </div>
    <div class="person-stats">
      ${t==='T1'?`<div class="pstat"><span class="n ${(s.commentCount||0)===0?'zero':'blue'}">${s.commentCount||0}</span><strong>Comments</strong></div>`:''}
      <div class="pstat"><span class="n ${s.resolvedCount===0?'zero':'green'}">${s.resolvedCount}</span>Resolved</div>
      ${t==='T2'?`<div class="pstat"><span class="n blue">${s.commentCount||0}</span>Comments</div>`:''}
      <div class="pstat"><span class="n ${cptRatio===null?'zero':cptRatio>=2?'green':cptRatio>=0.5?'blue':'zero'}">${cptRatio!=null?cptRatio:'&#8212;'}</span>Cmt/Ticket</div>
      <div class="pstat"><span class="n ${resColor}">${s.avgResDays!=null?s.avgResDays+'d':'&#8212;'}</span>Avg Time</div>
      <div class="pstat"><span class="n ${slaColor}">${s.slaRate!=null?s.slaRate+'%':'&#8212;'}</span>SLA Rate</div>
      <div class="pstat"><span class="n blue">${s.createdCount}</span>Created</div>
      <div class="pstat"><span class="n ${s.currentOpen>8?'amber':'zero'}">${s.currentOpen}</span>Open Now</div>
    </div>
    ${s.resolvedCount===0&&(s.commentCount||0)===0?`<div class="no-activity-banner">No activity recorded in this period</div>`:''}
    ${satLine}
    <div class="person-sec-title">Resolution Time Distribution</div>
    <div style="display:flex;gap:8px;padding:10px 14px 12px;align-items:flex-end;min-height:76px">${buckets}</div>
    <div class="person-sec-title">Weekly Resolved Trend</div>
    <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
  </div>`;
}

// ── Overview ────────────────────────────────────────────────
function renderOverview() {
  const overallSLA = teamSlaRate([...DATA.t1,...DATA.t2]);
  const overallAvg = teamAvgRes([...DATA.t1,...DATA.t2]);
  const overallSat = teamAvgSat([...DATA.t1,...DATA.t2]);

  return `<div class="wrap">
    <div class="kpi-row" style="grid-template-columns:repeat(7,1fr)">
      <div class="kpi k-res"><div class="kpi-label">Total Resolved</div><div class="kpi-val">${DATA.totalResolved}</div><div class="kpi-sub">all staff &middot; period</div></div>
      <div class="kpi k-cre"><div class="kpi-label">Total Created</div><div class="kpi-val">${DATA.totalCreated}</div><div class="kpi-sub">all staff &middot; period</div></div>
      <div class="kpi k-sla"><div class="kpi-label">Overall SLA Rate</div><div class="kpi-val">${overallSLA!=null?overallSLA+'%':'&#8212;'}</div><div class="kpi-sub">&le;${DATA.slaDays} business days</div></div>
      <div class="kpi k-avg"><div class="kpi-label">Avg Resolution</div><div class="kpi-val">${overallAvg!=null?overallAvg+'d':'&#8212;'}</div><div class="kpi-sub">business days</div></div>
      <div class="kpi k-sat"><div class="kpi-label">Avg Satisfaction</div><div class="kpi-val">${overallSat!=null?overallSat:'&#8212;'}</div><div class="kpi-sub">out of 5.0</div></div>
      <div class="kpi k-open"><div class="kpi-label">Open Now</div><div class="kpi-val">${DATA.totalOpen}</div><div class="kpi-sub">currently in queue</div></div>
      <div class="kpi k-avg" style="${DATA.unassignedOpen>0?'border-left-color:var(--amber)':''}"><div class="kpi-label">Unassigned</div><div class="kpi-val" style="${DATA.unassignedOpen>0?'color:#B45309':''}">${DATA.unassignedOpen}</div><div class="kpi-sub">need assignment</div></div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-hdr purple"><h2>T2 Staff &mdash; Leaderboard</h2><span class="chip">${DATA.t2.length} members</span></div>
        <div style="font-size:.7rem;color:var(--muted);padding:6px 14px;background:#FDFBFF;border-bottom:1px solid var(--border)">Click any row to view full profile</div>
        ${leaderboardTable(DATA.t2,'purple','T2')}
      </div>
      <div class="card">
        <div class="card-hdr blue"><h2>T1 Student Workers &mdash; Leaderboard</h2><span class="chip">${DATA.t1.length} members</span></div>
        <div style="font-size:.7rem;color:var(--muted);padding:6px 14px;background:#FDFBFF;border-bottom:1px solid var(--border)">Click any row to view full profile</div>
        ${leaderboardTable(DATA.t1,'blue','T1')}
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-hdr purple"><h2>Team Weekly Resolved Trend</h2><span class="chip">${DATA.allWeeks.length} weeks</span></div>
        <div class="chart-tall"><canvas id="chart-team-weekly"></canvas></div>
      </div>
      <div class="card">
        <div class="card-hdr blue"><h2>T2 vs T1 &mdash; Cumulative Resolved</h2></div>
        <div class="chart-tall"><canvas id="chart-tier-compare"></canvas></div>
      </div>
    </div>

    ${(()=>{
      // Aggregate resolution time buckets across all team members
      const teamBuckets = [0,0,0,0];
      [...DATA.t1,...DATA.t2].forEach(m=>{
        const s=DATA.stats[statKey(m)];
        if(!s) return;
        s.resBuckets.forEach((v,i)=>teamBuckets[i]+=v);
      });
      // Aggregate category breakdown
      const teamCats={};
      [...DATA.t1,...DATA.t2].forEach(m=>{
        const s=DATA.stats[statKey(m)];
        if(!s) return;
        s.resolved.forEach(t=>{const k=t.category||'Uncategorized';teamCats[k]=(teamCats[k]||0)+1;});
      });
      const catSorted=Object.entries(teamCats).sort((a,b)=>b[1]-a[1]);
      const totalRes=catSorted.reduce((s,[,n])=>s+n,0)||1;
      const maxCat=Math.max(1,...catSorted.map(c=>c[1]));
      const catRows=catSorted.map(([cat,n])=>`<tr>
        <td style="font-weight:500">${e(cat)}</td>
        <td><div style="display:flex;align-items:center;gap:8px">
          <div class="bar-wrap" style="flex:1"><div class="bar-inner bar-blue" style="width:${Math.round(n/maxCat*100)}%"></div></div>
          <span style="font-weight:700;min-width:28px;text-align:right">${n}</span>
        </div></td>
        <td style="color:var(--muted);font-size:.75rem;text-align:right;white-space:nowrap">${Math.round(n/totalRes*100)}%</td>
      </tr>`).join('')||'<tr><td colspan="3" class="no-data">No data</td></tr>';

      return `<div class="two-col">
        <div class="card">
          <div class="card-hdr purple"><h2>Team Resolution Time Distribution</h2><span class="chip">${DATA.totalResolved} resolved</span></div>
          <div class="chart-med"><canvas id="chart-team-restime"></canvas></div>
        </div>
        <div class="card">
          <div class="card-hdr blue"><h2>Top Categories &mdash; All Resolved Tickets</h2><span class="chip">${catSorted.length} categories</span></div>
          <table><thead><tr><th>Category</th><th>Count</th><th style="text-align:right">%</th></tr></thead><tbody>${catRows}</tbody></table>
        </div>
      </div>`;
    })()}
  </div>`;
}

function renderT2() {
  if (!DATA.t2.length) return '<div class="wrap"><p style="color:var(--slate);padding:40px;text-align:center">No T2 members in team_t2.csv</p></div>';
  const { ranks } = computeRanks(DATA.t2, 'T2');
  return `<div class="wrap"><div class="people-grid">${DATA.t2.map((m,i)=>personCard(m,'T2',i,ranks)).join('')}</div></div>`;
}
function renderT1() {
  if (!DATA.t1.length) return '<div class="wrap"><p style="color:var(--slate);padding:40px;text-align:center">No T1 members in team_t1.csv</p></div>';
  const { ranks } = computeRanks(DATA.t1, 'T1');
  return `<div class="wrap"><div class="people-grid">${DATA.t1.map((m,i)=>personCard(m,'T1',i,ranks)).join('')}</div></div>`;
}

// ── Chart init per tab ──────────────────────────────────────
function initTabCharts(tabId) {
  if (tabId === 'overview') {
    const shortWk  = DATA.allWeeks.map(w=>w.replace(/^\d{4}-/,''));
    const t2Weekly = DATA.allWeeks.map(w=>DATA.t2.filter(m=>DATA.stats[statKey(m)]).reduce((s,m)=>s+(DATA.stats[statKey(m)].weeklyResolved[w]||0),0));
    const t1Weekly = DATA.allWeeks.map(w=>DATA.t1.filter(m=>DATA.stats[statKey(m)]).reduce((s,m)=>s+(DATA.stats[statKey(m)].weeklyResolved[w]||0),0));
    const total    = DATA.allWeeks.map((_,i)=>t2Weekly[i]+t1Weekly[i]);

    mkChart('chart-team-weekly', {
      type:'line',
      data:{ labels:shortWk, datasets:[
        { label:'Total',     data:total,    borderColor:'#501D83', backgroundColor:'rgba(80,29,131,.07)', fill:true,  tension:.35, pointRadius:DATA.allWeeks.length>20?0:3, borderWidth:2 },
        { label:'T2 Staff',  data:t2Weekly, borderColor:'#B095DE', backgroundColor:'transparent',         fill:false, tension:.35, pointRadius:DATA.allWeeks.length>20?0:2, borderWidth:1.5, borderDash:[4,3] },
        { label:'T1 Workers',data:t1Weekly, borderColor:'#009FDF', backgroundColor:'transparent',         fill:false, tension:.35, pointRadius:DATA.allWeeks.length>20?0:2, borderWidth:1.5, borderDash:[4,3] }
      ]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{ legend:{position:'top',labels:{font:{family:"'Exo 2',sans-serif",size:11},boxWidth:12}} },
        scales:{ x:{ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:18},grid:{display:false}}, y:{min:0,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}} }
      }
    });

    // Team resolution time distribution
    const teamBuckets2=[0,0,0,0];
    [...DATA.t1,...DATA.t2].forEach(m=>{const s=DATA.stats[statKey(m)];if(!s)return;s.resBuckets.forEach((v,i)=>teamBuckets2[i]+=v);});
    mkChart('chart-team-restime', {
      type:'bar',
      data:{ labels:['1 day or less','2 \u2013 3 days','4 \u2013 5 days','Over '+DATA.slaDays+' days'],
        datasets:[{ label:'Tickets', data:teamBuckets2,
          backgroundColor:['rgba(34,197,94,.75)','rgba(0,159,223,.75)','rgba(245,158,11,.75)','rgba(239,68,68,.75)'],
          borderRadius:6 }]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:i=>`${i.raw} ticket${i.raw!==1?'s':''}`}} },
        scales:{ x:{grid:{display:false},ticks:{font:{size:11}}}, y:{min:0,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}} }
      }
    });

    // Cumulative resolved: running total over weeks for T2 vs T1
    let t2cum=0, t1cum=0;
    const t2Cum = t2Weekly.map(v=>(t2cum+=v,t2cum));
    const t1Cum = t1Weekly.map(v=>(t1cum+=v,t1cum));
    mkChart('chart-tier-compare', {
      type:'line',
      data:{ labels:shortWk, datasets:[
        { label:'T2 Staff',   data:t2Cum, borderColor:'#501D83', backgroundColor:'rgba(80,29,131,.08)', fill:true, tension:.3, pointRadius:0, borderWidth:2 },
        { label:'T1 Workers', data:t1Cum, borderColor:'#009FDF', backgroundColor:'rgba(0,159,223,.08)', fill:true, tension:.3, pointRadius:0, borderWidth:2 }
      ]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{ legend:{position:'top',labels:{font:{family:"'Exo 2',sans-serif",size:11},boxWidth:12}} },
        scales:{ x:{ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:18},grid:{display:false}}, y:{min:0,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}} }
      }
    });
  }

  if (tabId === 't2') {
    DATA.t2.forEach((m,i)=>{
      const sk=statKey(m);
      if(!DATA.stats[sk]) return;
      const wk=DATA.allWeeks.map(w=>(DATA.stats[sk].weeklyResolved[w]||0));
      mkChart(`sparkline-T2-${i}`, { type:'line',
        data:{ labels:DATA.allWeeks.map(w=>w.replace(/^\d{4}-/,'')), datasets:[{ data:wk, borderColor:'#501D83', backgroundColor:'rgba(80,29,131,.07)', fill:true, tension:.4, pointRadius:DATA.allWeeks.length>12?0:2, borderWidth:1.5 }]},
        options:{ responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>i[0].label,label:i=>`${i.raw} resolved`}}}, scales:{x:{display:false},y:{display:false,min:0}} }
      });
    });
  }

  if (tabId === 't1') {
    DATA.t1.forEach((m,i)=>{
      const sk=statKey(m);
      if(!DATA.stats[sk]) return;
      const wk=DATA.allWeeks.map(w=>(DATA.stats[sk].weeklyResolved[w]||0));
      mkChart(`sparkline-T1-${i}`, { type:'line',
        data:{ labels:DATA.allWeeks.map(w=>w.replace(/^\d{4}-/,'')), datasets:[{ data:wk, borderColor:'#009FDF', backgroundColor:'rgba(0,159,223,.07)', fill:true, tension:.4, pointRadius:DATA.allWeeks.length>12?0:2, borderWidth:1.5 }]},
        options:{ responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>i[0].label,label:i=>`${i.raw} resolved`}}}, scales:{x:{display:false},y:{display:false,min:0}} }
      });
    });
  }
}

// ── Main render ─────────────────────────────────────────────
function render() {
  const t2Res = DATA.t2.filter(m=>DATA.stats[statKey(m)]).reduce((s,m)=>s+DATA.stats[statKey(m)].resolvedCount,0);
  const t1Res = DATA.t1.filter(m=>DATA.stats[statKey(m)]).reduce((s,m)=>s+DATA.stats[statKey(m)].resolvedCount,0);
  const rangeFmt = fmtDate(DATA.startDate)+' &ndash; '+fmtDate(DATA.endDate);

  document.getElementById('root').innerHTML = `
  <header class="hdr">
    <div class="hdr-brand">
      <img class="hdr-logo" src="logos/FLPolyFullLogo_WHITE-FC.png" alt="Florida Polytechnic University">
      <div class="hdr-title">
        <h1>IT Help Desk &mdash; Performance Review</h1>
        <p>Florida Polytechnic University &middot; ISD2 Project</p>
      </div>
    </div>
    <div class="hdr-meta">
      <a href="index.html" style="color:rgba(255,255,255,.65);font-size:.78rem;font-weight:600;text-decoration:none;letter-spacing:.05em;margin-bottom:.35rem;display:block;">&#8592; All Reports</a>
      <strong>Review Period</strong>
      <div>${rangeFmt}</div>
      <div class="range-pill">SLA: &le;${DATA.slaDays} business days</div>
    </div>
  </header>
  <nav class="tabs-nav">
    <button class="tab-btn active" data-tab="overview" onclick="showTab('overview')">Overview</button>
    <button class="tab-btn" data-tab="t2" onclick="showTab('t2')">T2 Staff <span class="tab-badge">${t2Res} resolved</span></button>
    <button class="tab-btn" data-tab="t1" onclick="showTab('t1')">T1 Student Workers <span class="tab-badge">${t1Res} resolved</span></button>
  </nav>
  <div id="tab-overview" class="tab-content active"></div>
  <div id="tab-t2"       class="tab-content"></div>
  <div id="tab-t1"       class="tab-content"></div>
  <footer class="footer">Generated <span>${new Date(DATA.generatedAt).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true})}</span> &middot; Florida Polytechnic University IT Help Desk</footer>
  `;

  document.getElementById('tab-overview').innerHTML = renderOverview();
  document.getElementById('tab-t2').innerHTML       = renderT2();
  document.getElementById('tab-t1').innerHTML       = renderT1();
  _tabReady['overview'] = true;
  initTabCharts('overview');
}

render();
</script>
</body>
